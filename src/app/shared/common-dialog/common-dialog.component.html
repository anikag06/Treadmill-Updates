<div>
  <ng-container *ngIf="data.loading; else loadingComplete">
    <div class="mb-2">
      <span class="spinner-border spinner-border-sm"></span> Registering
    </div>
  </ng-container>
  <ng-template #loadingComplete>
    <div class="mb-2">
      Registered! Check your email to get the sign up link. Check in the spam/junk folder if you don't see the mail.
    </div>
      <div
        class="float-right"
        (click)="closeModal()"
        [ngStyle]="{ fontSize: '14px' }"
      >
        OK
      </div>
  </ng-template>
</div>
