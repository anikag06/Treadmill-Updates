
<app-custom-nav *ngIf="!registered_user"> </app-custom-nav>

<div class="container-div">
  <div [ngClass]="registered_user? 'full-div': 'main-div'" >
  <div class="row mx-0" *ngIf="!registered_user">
    <div class="col px-0">
      <p class="heading">Questionnaires</p>
      <p class="px-2 px-lg-1"> Below is a list of mental health questionnaires that can help you analyse any mental health condition you might be facing at the moment.</p>
    </div>
  </div>

  <div class="space-below-section">
    <div>
      <div [ngStyle]="{display: !loaded ? 'none' : 'block'}">
      <div *ngFor="let category of categoryList; let i = index">
        <div class="row mx-0">
          <div class="col px-2 px-lg-1">
            <p class="sub-heading mb-0">{{category}}</p>
          </div>
        </div>
      <div class="row no-gutters">

        <div [ngClass]="questionnaireItem.category=== category? 'each-item':'no-width'"
          *ngFor="let questionnaireItem of questionnaireItems"
        >
          <div *ngIf="questionnaireItem.category=== category" >
          <app-questionnaire
            [questionnaireItem]="questionnaireItem"
            isResult="false"
            isList="true"
            (removeLoading)="removeLoading()"
            (click)="questionnaireItemClick(questionnaireItem)"
          ></app-questionnaire>
        </div>
      </div>
      </div>
    </div>
      </div>

      <div class="col" [ngStyle]="{display: loaded ? 'none' : 'block'}">
      <div class="text-center loader">
        <img src="assets/shared/loading-gif.gif" alt="loader" width="80">
      </div>
    </div>

    </div>
    </div>
  </div>
</div>
