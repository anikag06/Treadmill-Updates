<div class="toast" role="alert" aria-live="assertive" aria-atomic="true" [@showHide]="'show'">
  <div class="toast-header">
    <img src="favicon.ico" class="rounded mr-2" alt="logo" style="height: 20px;">
    <strong class="mr-auto">{{title}}</strong>
    <button type="button" class="ml-2 mb-1 close" data-dismiss="toast" aria-label="Close" (click)="onClose()">
      <span aria-hidden="true">&times;</span>
    </button>
  </div>
  <div class="toast-body">
    {{body}}
  </div>
</div>
