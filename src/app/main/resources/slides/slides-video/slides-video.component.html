<div class="slide-video justify-content-center text-center">
  <iframe
    class="slide-video-iframe"
    [src]="videoUrl | safeUrl"
    id="player"
    #slideVideo
    allow="autoplay"
  ></iframe>

  <div class=" justify-content-center text-center ">
    <p class=" play-text">Click play to start</p>

    <button
      type="button"
      class="btn btn-small back-text"
      (click)="onBack()"
      #backBtn
    >
      {{ backBtnTxt }}
    </button>
  </div>
</div>
