<mat-menu #menu="matMenu" xPosition="before">
  <button mat-menu-item (click)="showThreeMinVideo()">
    <span>3 minutes</span>
  </button>
  <button mat-menu-item (click)="showFiveMinVideo()">
    <span>5 minutes</span>
  </button>
</mat-menu>

<div class="slide-video justify-content-center text-center">
  <iframe class="slide-video-iframe" [src]="sanitizedUrl" id='player' #slideVideo></iframe>
  <div>
    <div><button type="button" [matMenuTriggerFor]="menu" mat-flat-button class="float-left duration-btn">
        Change duration</button>
      <div class=" play-text justify-content-center text-center "> Click play to start</div>
    </div>


    <div class="align-text-end">
      <button type="button" class="btn btn-small back-text" (click)="onBack()" #backBtn>Back to
        slide</button>
    </div>
  </div>
</div>
