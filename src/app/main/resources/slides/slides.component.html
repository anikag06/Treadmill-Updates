<div class="row w-100" id="slide-page" #slidePage >
  <ng-container  *ngIf="slide else loader" >
    <div class="col-1 in-desktop"></div>
    <div class="col px-0 changes-width overflow-auto"
      #slideDiv [scrollTop]="scrollTop"
      id="slide-container"
      [@slideInOut] = "isSlidesVisible ? 'show' : 'hidden'"  >
      
      <div class="row h-100 justify-content-center">
        <mat-card-header 
          class="col-12 w-100 px-0 card-header in-desktop sticky-top slideTitle">
          <mat-card-title class="my-auto d-inline-block">
              {{slide.title}}
          </mat-card-title>
        </mat-card-header>

        <div class="row justify-content-center slides-elements-div" >
          <!-- <iframe [src]="sanitizedUrl" frameborder="0" class="slide_iframe"
            allowfullscreen="true"
            mozallowfullscreen="true" webkitallowfullscreen="true"></iframe>   -->
          <iframe 
            src="https://docs.google.com/presentation/d/e/2PACX-1vRPY5dYMULltTLDSpFokBCteHYLmhxb_M5A7LFlWdwjawcFEoDsriDRHEkDVDUtJxAKZakrBTiCItEG/embed?start=false&loop=false&delayms=3000" 
            frameborder="0" class="slide_iframe" allowfullscreen="true" 
            mozallowfullscreen="true" webkitallowfullscreen="true"></iframe>
          <div class="row w-100 like-btns-div justify-content-around">
            
            <div class="col-3 h-100 px-1 like-dislike-btns">
              <img src="../../../../assets/shared/thumb.svg" *ngIf='!slideLiked'
                id="like-btn"
                class="h-100"
                (click)= "onLikeBtnClick()">
              <img src="../../../../assets/shared/thumb_yellow.svg" *ngIf='slideLiked'
                id="like-yellow-btn"
                class="h-100"
                (click)= "onLikeBtnClick()">
            </div>

            <div class="col-3 h-100 mx-0 px-0 like-dislike-btns">
              <img src="../../../../assets/shared/thumb.svg" *ngIf='!slideDisliked'
                id="dislike-btn"
                class="dislike-btn h-100"
                (click)= "onDislikeBtnClick()">
              <img src="../../../../assets/shared/thumb_yellow.svg" *ngIf='slideDisliked'
                id="dislike-yellow-btn"
                class="dislike-btn h-100"
                (click)= "onDislikeBtnClick()">
            </div>

            <div class="col-6 h-100 px-0">
              <button class="completed-btn float-right h-100" type="button"
                *ngIf = '!showNextStepBtn && !lastStepCompleted'
                mat-raised-button color="primary"
                (click)="onCompleted()">
                Completed
              </button>
              <button class="next-step-btn float-right h-100" type="button"
                *ngIf = 'showNextStepBtn && !isLastStep'
                mat-raised-button color="primary"
                (click)="onNextStepClick()">
                <img id="flow-img" src="../../../../assets/shared/Flow_white.svg">
                Next Step
              </button>
              <button class="completed-btn float-right h-100" type="button"
                *ngIf = 'lastStepCompleted'
                mat-raised-button color="primary"
                (click)="onDashboard()">
                Go to dashboard
              </button>
            </div>
          </div>

          <div class="my-1 mx-1 feedbackBox row w-100" 
            *ngIf="isDislikeBox || isLikeBox || likeDislikeRemoved">
            <p class="my-0 text-property" *ngIf="isDislikeBox"> 
              How can we improve it?
            </p>
            <p class="my-0 text-property" *ngIf="isLikeBox">
              Send the feedback
            </p>
            <p class="my-0 text-property" *ngIf="likeDislikeRemoved">
              What changed your mind?
            </p>
            <textarea class="w-100 rounded form-control" rows="3" #feedbackText
                placeholder="Your message goes here ..."> </textarea>
            <button class="px-0 my-1 btn-padding" 
              mat-raised-button color="primary" 
              (click)="onSubmitComment(feedbackText.value)">
              Submit
            </button>
          </div>
            
        </div>
      </div>
    </div>

    <div class="col in-mobile border-right extra-form-div"
      *ngIf="!visible">
    </div> 
    <div class="col-2 my-5 h-100 px-0 mx-0 in-mobile" *ngIf="visible === false" >
      <button class="rotate-rev ml-n3"
        id="slide-btn"
        mat-raised-button color="primary" (click)= "onShowSlides()">
        Slide
      </button>
    </div>
    
    <div class="col-2 my-5 h-100 px-0 mx-0 in-mobile" *ngIf="visible === true" #slideButton>
      <button class="rotate-rev mr-n3"
        id="form-btn"
        mat-raised-button color="primary" (click)= "onShowForm()">
        Form
      </button>
    </div>
    <div class="col in-mobile border-left extra-slide-div" 
      *ngIf="visible">
    </div>

    <div class="col in-desktop">
    </div>

    <div class="col mx-0 px-0 form-div changes-width overflow-auto" 
      #form_div [@formInOut]  = "isFormVisible ? 'show' : 'hidden'" >
      <div class="mx-0 px-0" form-host></div>
    </div>
    <div class="col-1 in-desktop"></div>
  </ng-container>

  <ng-container *ngIf="notAvailable">
    <h1>The content is not available</h1>
  </ng-container>
</div>

<ng-template #loader>
  <div class="col-6">
    <div class="text-center loader">
      <img src="assets/shared/dna-loader.svg" alt="loader" width="200">
    </div>
  </div>
</ng-template>
