<div class="row w-100 mb-4" id="slide-page" #slidePage [scrollTop]="scrollTop">
  <ng-container  *ngIf="slide else loader" >
    <div class="col-1 in-desktop"></div>
    <div class="col px-0 changes-width"
      #slideDiv 
      id="slide-container"
      [@slideInOut] = "isSlidesVisible ? 'show' : 'hidden'"  >
      <div class="row changes-width justify-content-center">
        <div class="w-100 in-desktop slideTitle py-1">{{slide.title}}</div>
        <div class="row justify-content-center buttons-div" >
          <iframe [src]="sanitizedUrl" frameborder="0" class="slide_iframe"
            allowfullscreen="true"
            mozallowfullscreen="true" webkitallowfullscreen="true"></iframe>  
          
          <div class="row mx-1 my-2 w-100 justify-content-around">
            
            <div class="col-3 h-100 px-1">
              <img src="../../../../assets/shared/thumb.svg" *ngIf='!slideLiked'
                id="like-btn"
                class="h-100"
                (click)= "onLikeBtnClick()">
              <img src="../../../../assets/shared/thumb_yellow.svg" *ngIf='slideLiked'
                id="like-yellow-btn"
                class="h-100"
                (click)= "onLikeBtnClick()">
            </div>

            <div class="col-3 h-100 mx-0 px-0">
              <img src="../../../../assets/shared/thumb.svg" *ngIf='!slideDisliked'
                id="dislike-btn"
                class="dislike-btn h-100"
                (click)= "onDislikeBtnClick()">
              <img src="../../../../assets/shared/thumb_yellow.svg" *ngIf='slideDisliked'
                id="dislike-yellow-btn"
                class="dislike-btn h-100"
                (click)= "onDislikeBtnClick()">
            </div>

            <div class="col-6 h-100 px-0 mx-0">
              <button class="completed-btn float-right" 
                mat-raised-button color="primary"
                (click)="onCompleted()">
                Completed
              </button>
            </div>
          </div>

          <div class="my-1 row w-100" 
            *ngIf="isDislikeBox || isLikeBox || likeDislikeRemoved">
            <p class="text-property" *ngIf="isDislikeBox"> 
              How can we improve it?
            </p>
            <p class="text-property" *ngIf="isLikeBox">
              Send the feedback
            </p>
            <p class="text-property" *ngIf="likeDislikeRemoved">
              What changed your mind?
            </p>
            <textarea class="w-100 rounded form-control" rows="3" #feedbackText
                placeholder="Your message goes here ..."> </textarea>
            <button class="px-0 my-1 btn-padding" 
              mat-raised-button color="primary" 
              (click)="onSubmitComment(feedbackText.value)">
              Submit
            </button>
          </div>
            
        </div>
      </div>
    </div>

    <div class="col in-mobile border-right extra-form-div"
      *ngIf="!visible">
    </div> 
    <div class="col-2 my-5 h-100 px-0 mx-0 in-mobile" *ngIf="!visible" >
      <button class="rotate-rev ml-n3"
        id="slide-btn"
        mat-raised-button color="primary" (click)= "onShowSlides()">
        Slide
      </button>
    </div>
    
    <div class="col-2 my-5 h-100 px-0 mx-0 in-mobile" *ngIf="visible" #slideButton>
      <button class="rotate-rev mr-n3"
        id="form-btn"
        mat-raised-button color="primary" (click)= "onShowForm()">
        Form
      </button>
    </div>
    <div class="col in-mobile border-left extra-slide-div" 
      *ngIf="visible">
    </div>

    <div class="col in-desktop">
    </div>

    <div class="col mx-0 px-0 form-div changes-width" 
      #form_div [@formInOut]  = "isFormVisible ? 'show' : 'hidden'" >
      <div form-host></div>
    </div>
    <div class="col-1 in-desktop"></div>
  </ng-container>

  <ng-container *ngIf="notAvailable">
    <h1>The content is not available</h1>
  </ng-container>
</div>

<ng-template #loader>
  <div class="col-6">
    <div class="text-center loader">
      <img src="assets/shared/dna-loader.svg" alt="loader" width="200">
    </div>
  </div>
</ng-template>
