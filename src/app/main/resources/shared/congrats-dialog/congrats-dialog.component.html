<div class="congrats-div d-flex row mx-0 ">

    <div class="row badge-div w-100">
        <div class="col  justify-content-center" style="position:relative; display: inline-block;">
            <div  style="position:relative; display: block; top:40px;right:55px;">
             <img class="badge-img" style="position:absolute;"  [src]='badge_img_src'>
            </div>

          <img class="sparkled-img" [src]='img_src' >
          <p class="badge-text" *ngIf='showBadge'>
            {{badgeName}} </p>
        </div>
    </div>
    <div class="row w-100 align-self-center px-2">
        <div class="col justify-content-center" >
          <p class="congrats-text"> Congratulations!</p>
          <p class="text"> You have earned a gold badge for completing the "<span class="text" *ngIf='showBadge'>
          {{badgeInfo}}
        </span>" module.</p>
            <p class="next-text" *ngIf='data.isLastStep && data.isLocked'>
                Next module will unlock on {{unLockTime | date:"medium"}}</p>

        </div>
    </div>

    <div class="row w-100 align-self-end next-step-div justify-content-center" >
        <button class="next-step-locked h-100 mb-4" type="button"
            *ngIf='data.isLocked || data.isLastStep'
            (click) = 'goToDashboard()'
            mat-raised-button>
           {{navigate_to}}
        </button>
    </div>

</div>
