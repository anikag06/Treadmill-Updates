<div class="main">
<mat-card  class="container-fluid px-0 pt-0 pb-2 mb-2" >
      <div class="row">
      <div class="col mt-4 mt-lg-0" [ngStyle]="{'background-color': quiz_active? '#FAF4EA' :'white'}">
          <div [ngStyle]="{'opacity': quiz_active? '0' : '1'}">
            <mat-card-header class="title col-12 w-100 my-auto px-0">
              <mat-card-title class="my-auto d-inline-block justify-content-center py-2 ">
                Conclusion
              </mat-card-title>
            </mat-card-header>

          </div>
          <router-outlet></router-outlet>
        </div>
      </div>
    </mat-card>
</div>
