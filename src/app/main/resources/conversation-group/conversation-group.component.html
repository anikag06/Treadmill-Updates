<div class="q">
  <div class="container">
    <div class="row">
      <div
        class="col-lg-6 col-sm-12 col-md-12"
        *ngFor="let conversation of conversationGroups; let i = index"
      >

        <div class="card text-left" >
          <div class="row">
          <div *ngIf="showLoading" class="col-12 text-muted text-center" style="position:absolute;top:40%"> Loading... </div>
        </div>
          <div class="row" [ngStyle]="{visibility: showLoading ? 'hidden' : 'visible'}">
            <div class="col-12">
              <div class="heading">
                <b>{{ conversation.title }} </b>
                <div class="mx-2 float-right">
                  <img [src]="conversation.avatar_image" class="imgg text-right" (load)="removeLoading()"  />
                </div>
              </div>
            </div>
          </div>
          <div class="row" class="text" [ngStyle]="{visibility: showLoading ? 'hidden' : 'visible'}">
            <div class="col-12" [innerHTML]="conversation.description">
            </div>
          </div>
          <div class="row">
            <div class="col-12 text-center">
              <div class="btn-group" role="group">
                <div *ngIf="conversation.is_show_continue_button; else start">
                  <button
                    class="one-edge-shadow"
                    id="continue"
                    class="button"
                    (click)="current_history(i)"
                  >
                    Continue
                  </button>
                  <button
                    class="one-edge-shadow"
                    id="reset"
                    class="button"
                    (click)="reset(i)"
                  >
                    Reset
                  </button>
                </div>
                <ng-template #start>
                  <button
                    class="one-edge-shadow"
                    class="button"
                    (click)="reset(i)"
                  >
                    Start
                  </button>
                </ng-template>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
