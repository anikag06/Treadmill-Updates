<div class="q">
    <div class="container">
        <div class="row">
            <div class="col-lg-6 col-sm-12 col-md-12" *ngFor="let item of group; let i = index">
                <div class="card text-left">

                    <div class="row">
                        <div class="col-12">
                            <div class="heading">
                                <b>{{item.title}} </b>, {{item.occupation}}
                                <div class="mx-2 float-right">
                                        <img src="./logo_small.png" class="imgg text-right" />
                                 </div>

                            </div>
                        </div>
                        


                    </div>
                    <div class="row" class="text">
                        <div class="col-12">

                            Lorem Ipsum is simply dummy text of the printing and typesetting industry. Lorem Ipsum has
                            been the industry's standard dummy text ever since the 1500s, when an unknown printer took a
                            galley of type and scrambled it to make a type specimen book.


                        </div>
                    </div>
                    <div class="row">

                        <div class="col-12 text-center">
                            <div class="btn-group" role="group">
                                <button class="one-edge-shadow" id="continue" class="buttonn"
                                    (click)="current_history(i)">continue</button>
                                <button class="one-edge-shadow" id="reset" class="buttonn"
                                    (click)="reset(i)">reset</button>

                                
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
</div>
