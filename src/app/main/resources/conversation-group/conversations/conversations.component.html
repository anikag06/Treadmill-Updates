<div class="row w-100" id="conv-page">
  <ng-container *ngIf="conversation else loader">
    <div class="col-1 in-desktop"></div>
    <div class="col changes-width " #convDiv [scrollTop]="scrollTop" id="conversation-container"
      [@slideInOut]="isConversation ? 'show' : 'hidden'">


      <div class="row changes-width justify-content-center">
        <div class="w-100 in-desktop convTitle">
          <div class=" pt-2 pb-0 h-100 my-auto">
            <p> <button class="float-right" id="speed" (click)="speed_run()">Show full conversation</button>
              {{title}} </p>
          </div>
        </div>
      </div>

      <div class="row changes-width sticky-top justify-content-center">
        <div class="col bar sticky-top">
          <div class="progress my-3 mx-2 sticky-top" style="height: 5px">
            <div class="progress-bar" role="progressbar" style="background-color: black"
              [ngStyle]="{'width.%': progress}"></div>
          </div>
        </div>
      </div>



      <div class="row h-100 justify-content-center conv-elements-div">
        <div *ngFor="let item of show">
          <div *ngFor="let i of item.message">
          <div *ngIf="item.message.length != 0"  class="d-flex justify-content-start mb-3 ">
            <div class="img_cont_msg ml-3">
              <img [src]="item.show_avatar_image" class="rounded-circle user_img_msg">
            </div>

            <div  class="msg_cotainer" [style.border-bottom-color]="item.wrong ? '#FF6A6A' : null" >
              <p [innerHtml]="i"></p>
            </div>
          </div>
        </div>
          <div *ngFor="let i of item.dialog"  class='d-flex justify-content-end mb-3'>

            <div  class="msg_cotainer_send ml-3 ml-md-0 mr-3" [@fadeInOut]  [ngStyle]="{'border-bottom-color':item.wrong ? '#FF6A6A' : null}">
              <p [innerHtml]="i"></p>
            </div>
          </div>
        </div>
        <!-- </div> -->
        <!-- <div class="card-body"> -->
        <div class="row " *ngFor = "let i of current_message; let i = index" >
          <div >
          <div *ngIf="current_message.length != 0" class="d-flex justify-content-start mb-3 ">
            <div class="img_cont_msg ml-3">
              <img [src]="show_avatar_image" class="rounded-circle user_img_msg">
            </div>
            <div *ngIf="i.ShowTyping"  class="msg_cotainer" >
              <div class="dot-typing  mt-1 ml-2 mr-2"></div>
            </div>
            <div *ngIf="!i.ShowTyping" class="msg_cotainer conv-elements-div">
              <p  [innerHtml]="i.message"></p>
            </div>
          </div>
          </div>
        </div>
        <!-- </div> -->

        <div *ngIf="!finished" >
          <div class="row justify-content-end conv-elements-div" *ngFor=" let item of options; let i = index">
            <div class="d-flex justify-content-end  mb-3" *ngIf="!speedrun">
              <div class="msg_cotainer_send ml-3 ml-md-0 mr-3">
                <p [innerHtml]="item"></p>
                <button  class="btn"  (click)="count_multiple != (show_multiple - 1) ? on_multiple_options() :  on_click(i)">Send</button>
                <img class ="SendImage" [src]="send_image" (click)="count_multiple != (show_multiple - 1) ? on_multiple_options() :  on_click(i)"/>
              </div>
            </div>
          </div>
        </div>

        <div class="row justify-content-center" *ngIf="wrong">
          <div class="d-flex justify-content-center mb-3 mx-3 error-msg align-items-center">
            <div class="img_cont mx-3 align-items-center">
              <img [src]="show_avatar_image" class="rounded-circle user_img">
            </div>
            <div>
              <p class="my-3 mx-3">{{wrong_message}}</p>
            </div>
          </div>
        </div>


        <div class="row mx-4 my-3 justify-content-center summary" *ngIf="finished">
          <div class="d-flex mx-5 justify-content-center">
            <h2>Summary</h2>
          </div>
          <div class="d-flex justify-content-center">
            <p class="finish-text">{{final_conclusion_message}}</p>
          </div>
          <div class="row w-100 mb-2 like-btns-div justify-content-around">
            <div class="col h-100 px-1 like-dislike-btns">
              <img src="../../../../assets/shared/Like_slide.png" *ngIf='!convLiked' id="like-btn" class="h-100 mr-2"
                (click)="onLikeBtnClick()">
              <img src="../../../../assets/shared/Like_slide_selected.png" *ngIf='convLiked' id="like-yellow-btn"
                class="h-100 mr-2" (click)="onLikeBtnClick()">
              <!-- </div> -->

              <!-- <div class="col-3 h-100 mx-0 px-0 like-dislike-btns"> -->
              <img src="../../../../assets/shared/disike_slide.png" *ngIf='!convDisliked' id="dislike-btn"
                class="dislike-btn h-100" (click)="onDislikeBtnClick()">
              <img src="../../../../assets/shared/dislike_slide_selected.png" *ngIf='convDisliked'
                id="dislike-yellow-btn" class="dislike-btn h-100" (click)="onDislikeBtnClick()">
            </div>

            <div class="col-7 h-100 px-0">
              <button class="completed-btn float-right h-100" *ngIf='!showNextStepBtn' mat-raised-button color="primary"
                (click)="onCompleted()">
                Completed
              </button>
              <button class="next-step-btn float-right h-100" *ngIf='showNextStepBtn && !isLastStep' mat-raised-button
                color="primary" (click)="onNextStepClick()">
                <img id="flow-img" src="../../../../assets/shared/Go to icon.png">
                Next Step
              </button>
              <button class="completed-btn float-right h-100" *ngIf='isLastStep' mat-raised-button color="primary"
                (click)="onDashboard()">
                Go to dashboard
              </button>
            </div>
          </div>

          <div class="my-1 mx-1 row w-100" *ngIf="isDislikeBox || isLikeBox || likeDislikeRemoved">
            <p class="my-0 text-property" *ngIf="isDislikeBox">
              How can we improve it?
            </p>
            <p class="my-0 text-property" *ngIf="isLikeBox">
              Send the feedback
            </p>
            <p class="my-0 text-property" *ngIf="likeDislikeRemoved">
              What changed your mind?
            </p>
            <textarea class="w-100 rounded form-control" rows="3" #feedbackText
              placeholder="Your message goes here ..."> </textarea>
            <button class="submit-btn px-0 my-1 btn-padding" mat-raised-button color="primary"
              (click)="onSubmitComment(feedbackText.value)">
              Submit
            </button>
          </div>
        </div>
      </div>

    </div>

    <div class="col in-mobile border-right extra-form-div" *ngIf="!isvisible">
    </div>
    <div class="col-1 my-5 h-100 px-0 mx-0  in-mobile" *ngIf="isvisible === false">
      <button class="rotate-rev" id="conv-btn" mat-raised-button color="primary" (click)="onShowConv()">
        Conversation
      </button>
    </div>

    <div class="col-1 my-5 h-100 px-0 mx-0 in-mobile" *ngIf="isvisible === true">
      <button class="rotate-rev mr-n3" id="form-btn" mat-raised-button color="primary" (click)="onShowForm()">
        Form
      </button>
    </div>
    <div class="col in-mobile border-left extra-slide-div" *ngIf="isvisible">
    </div>


    <div class="col in-desktop">
    </div>

    <div class="col mx-0 px-0 form-div changes-width" #form_div [@formInOut]="isFormVisible ? 'show' : 'hidden'">
      <div class="mx-0 px-0" form-host></div>
    </div>
    <div class="col-1 in-desktop"></div>
  </ng-container>
</div>

<ng-template #loader>
  <div class="col-6">
    <div class="text-center loader">
      <img src="assets/shared/dna-loader.svg" alt="loader" width="200">
    </div>
  </div>
</ng-template>
