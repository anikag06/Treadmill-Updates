<div class="row w-100" id="conv-page">
  <ng-container *ngIf="conversation; else loader">
    <div
      class="col col-md-6 changes-width h-auto"
      #convDiv
      [scrollTop]="scrollTop"
      id="conversation-container"
      [@slideInOut]="isConversation ? 'show' : 'hidden'"
    >
      <div class="row changes-width justify-content-center">
        <div class="w-100 in-desktop convTitle">
          <div class="pt-2 pb-0 h-100 my-auto">
            <div class="float-left mx-2">
              {{ title }}
            </div>
            <p [ngStyle]="{ lineHeight: '25px' }">
              <button class="float-right" id="speed" (click)="speed_run()">
                Show full conversation
              </button>
            </p>
          </div>
        </div>
      </div>

      <div class="row changes-width sticky-top justify-content-center">
        <div class="col bar sticky-top">
          <div class="progress my-3 mx-2 sticky-top" style="height: 5px;">
            <div
              class="progress-bar"
              role="progressbar"
              style="background-color: black;"
              [ngStyle]="{ 'width.%': progress }"
            ></div>
          </div>
        </div>
      </div>

      <div class="row h-auto justify-content-center conv-elements-div">
        <div *ngFor="let conversation of completedConversation">
          <div *ngFor="let msg of conversation.dialog">
            <div
              *ngIf="conversation.dialog.length !== 0"
              class="d-flex justify-content-start mb-3"
            >
              <div class="img_cont_msg ml-3">
                <img
                  [src]="show_avatar_image"
                  class="rounded-circle user_img_msg"
                />
              </div>

              <div
                class="msg_container"
                [style.border-bottom-color]="
                  conversation.wrong ? '#FF6A6A' : null
                "
              >
                <p [innerHtml]="msg.message"></p>
                <div class="chat_image" *ngIf="msg.dialog_images">
                  <div *ngFor="let image of msg.dialog_images">
                    <app-chat-image
                      fromConversation="true"
                      [image]="image"
                    ></app-chat-image>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div
            *ngFor="let msg of conversation.option"
            class="d-flex justify-content-end mb-3"
          >
            <div
              class="msg_container_send ml-3 ml-md-0 mr-3"
              [@fadeInOut]
              [ngStyle]="{
                'border-bottom-color': conversation.wrong ? '#FF6A6A' : null
              }"
            >
              <p [innerHtml]="msg.message"></p>
              <div class="chat_image" *ngIf="msg.option_images">
                <div *ngFor="let image of msg.option_images">
                  <app-chat-image
                    fromConversation="true"
                    [image]="image"
                  ></app-chat-image>
                </div>
              </div>
            </div>
          </div>
        </div>
        <!-- </div> -->
        <!-- <div class="card-body"> -->
        <div class="row" *ngFor="let dialog of current_dialog; let i = index;let last=last">
            <div
              *ngIf="current_dialog.length != 0"
              class="d-flex justify-content-start mb-3"
              [ngStyle]="{minWidth : '100%'}"
            >
              <div class="img_cont_msg ml-3">
                <img
                  [src]="show_avatar_image"
                  class="rounded-circle user_img_msg"
                />
              </div>
              <div *ngIf="dialog.showTyping" class="msg_container">
                <div class="dot-typing mt-1 ml-2 mr-2"></div>
              </div>
              <div *ngIf="!dialog.showTyping" class="msg_container1">
                <p [innerHtml]="dialog.message"></p>

                <div
                  *ngIf="
                    dialog.dialog_images && dialog.dialog_images.length > 0
                  "
                >
                  <div *ngFor="let image of dialog.dialog_images">
                    <app-chat-image
                      fromConversation="true"
                      [image]="image"
                    ></app-chat-image>
                  </div>
                </div>
              </div>
            </div>
          </div>

        <div class="row justify-content-center" *ngIf="wrong">
          <div
            class="d-flex justify-content-center mb-3 mx-3 error-msg align-items-center"
          >
            <div class="img_cont mx-3 align-items-center">
              <img [src]="therapist_img" class="rounded-circle user_img" />
            </div>
            <div>
              <p class="my-3 mx-3" [innerHTML]="wrong_message"></p>
            </div>
            <div *ngIf="(wrongImageObject | json) != '{}'">
              <app-chat-image
                fromConversation="true"
                [image]="wrongImageObject"
              ></app-chat-image>
            </div>
          </div>
        </div>

        <div *ngIf="!finished">
          <div
            class="row justify-content-end conv-elements-div"
            *ngFor="let option of options; let i = index;let last=last"
          >
            <div class="d-flex justify-content-end mb-3" *ngIf="!speedrun">
              <div class="msg_container_send1 ml-3 ml-md-0 mr-3" #optionDiv>
                <p class="pr-2" [innerHtml]="option.message"></p>
                <div
                  *ngIf="
                    option.option_images && option.option_images.length > 0
                  "
                >
                  <div *ngFor="let image of option.option_images">
                    <app-chat-image
                      fromConversation="true"
                      [image]="image"
                    ></app-chat-image>
                  </div>
                </div>
                <div
                  (click)="
                    count_multiple !== show_multiple - 1
                      ? on_multiple_options(i)
                      : onOptionClick(i)
                  "
                  class="btn d-inline-block"
                >
                  <img class="SendImage" [src]="send_image" />
                  <div class="d-inline-block">

                    Send
                  </div>
                </div>
              </div>
            </div>
            <div
              class="mb-2 justify-content-end mr-3 text-center or-div"
              *ngIf="options.length === 2 && i == 0"
             [ngStyle]="{width : getOrWidth()}"
            >
              {{getOrWidth()!==null ? 'OR' : ''}}
            </div>
          </div>
        </div>
      </div>

      <div
        class="row mx-4 my-3 justify-content-center summary"
        *ngIf="finished"
      >
        <div class="d-flex mx-5 justify-content-center">
          <h2>Summary</h2>
        </div>
        <div class="d-flex justify-content-center">
          <p class="finish-text" [innerHTML]="final_conclusion_message" ></p>
        </div>

        <app-user-feedback
          class="w-100 feedback-div"
          [disliked]="convDisliked"
          [liked]="convLiked"
          [showNextStepBtn]="showNextStepBtn"
          [showloading]="showloading"
          (scrollEvent)="scrollPageToBottom()"
          (nextStepEvent)="onNextStepClick()"
          (completedEvent)="onCompleted()"
          (storeFeedbackEvent)="storeFeedBackData()"
          (submitCommentEvent)="onSubmitComment()"
        >
        </app-user-feedback>
      </div>
    </div>

    <div
      class="col in-mobile border-right extra-form-div"
      *ngIf="!isvisible"
    ></div>
    <div class="col-1 my-5 h-100 px-0 mx-0 in-mobile" *ngIf="!isvisible">
      <button
        class="rotate-rev"
        id="conv-btn"
        mat-raised-button
        color="primary"
        (click)="onShowConv()"
      >
        Conversation
      </button>
    </div>

    <div class="col-1 my-5 h-100 px-0 mx-0 in-mobile" *ngIf="isvisible">
      <button
        class="rotate-rev mr-n3"
        id="form-btn"
        mat-raised-button
        color="primary"
        (click)="onShowForm()"
      >
        Form
      </button>
    </div>
    <!--    <div class="col in-mobile border-left extra-slide-div" *ngIf="isvisible">-->
    <!--    </div>-->

    <div class="col-1 px-0 in-desktop"></div>

    <div
      class="col col-md-5 mx-0 px-0 form-div changes-width"
      #form_div
      [@formInOut]="isFormVisible ? 'show' : 'hidden'"
    >
      <div class="mx-0 px-0" form-host></div>
    </div>
  </ng-container>
</div>

<ng-template #loader>
  <div class="text-center loader">
    <img src="assets/shared/loading-gif.gif" alt="loader" width="80" />
  </div>
</ng-template>
