
<div class="forms mt-3">
  <div class="row mx-auto">
    <div
      class="col-lg-4 col-md-6 col-sm-12 px-lg-3 px-md-2 col-xs-12 form-div mb-lg-4 mb-md-3"
      *ngFor="let form of forms"
    >
      <!--      <a [routerLink]="form.path">-->
      <mat-card
        class="pl-0 form-card"
        (click)="navigate(form)"
        [ngStyle]="{ cursor: 'pointer' }"
      >
        <mat-card-header style="max-height : 25vh; min-height : 20vh;">
          <!--            <mat-card-title>{{form.name}}</mat-card-title>-->
        </mat-card-header>
        <mat-card-content> </mat-card-content>
        <!--          <img mat-card-image [src]="form.banner" width="100" height="110">-->
        <mat-card-footer>
          <div class="form-name ml-3 pl-3">
            {{ form.name }}
          </div>
        </mat-card-footer>
      </mat-card>
      <!--      </a>-->
    </div>
  </div>
</div>
