<div class="card-full-width">
  <div class="card-header">
    {{ header }}
    <div class="edit-icon">
      <mat-icon class="edit_icon" (click)="onEditSituationClick()">
        edit
      </mat-icon>
    </div>
  </div>
  <div class="card-body">
    <form [formGroup]="behaviorFormGroup">
      <mat-form-field class="full-width">
        <textarea
          matInput
          name="problemStatement"
          class="py-0"
          #formInput="matInput"
          [placeholder]="
            formInput.focused || formInput.empty ? 'Write Here' : ''
          "
          class="py-0"
          cdkTextareaAutosize
          cdkAutosizeMinRows="1"
          formControlName="behavior"
          required
          (focusout)="updateText()"
          (focus)="onShowContinueButton()"
        ></textarea>
      </mat-form-field>
      <p class="text-right">
        <button
          mat-raised-button
          type="button"
          *ngIf="showContinue"
          class="btn continue-btn"
          (click)="onBehaviorSubmit()"
        >
          <ng-container *ngIf="!showSpinner; else loading">Continue </ng-container>
          <ng-template #loading>
            <span class="spinner-border spinner-border-sm"></span>
            Loading..
          </ng-template>
        </button>
      </p>
    </form>
  </div>
</div>
