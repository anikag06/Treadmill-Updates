<mat-expansion-panel hideToggle #panel>
  <mat-expansion-panel-header
          [ngStyle]="{ background: '#FFF3E9',paddingLeft:'16px' }"
          [expandedHeight]="'42px'"
          [collapsedHeight]="'42px'"
  >
    <mat-panel-title
      [ngStyle]="{
        'font-size': panel.expanded ? '16px' : '14px',
        'font-weight': '500'
      }"
    >
      {{ techniqueName }}
    </mat-panel-title>
    <mat-panel-description>
      <div class="iconsDiv" *ngIf="panel.expanded">
        <mat-icon>close</mat-icon>
      </div>
      <div class="iconsDiv" *ngIf="!panel.expanded && submitted">
        <img src="assets/forms/edit_errors.png" width="24px" />
      </div>
    </mat-panel-description>
  </mat-expansion-panel-header>

  <ng-template matExpansionPanelContent>
    <div class="q-heading">
      {{ question }}
    </div>

    <form [formGroup]="suggestionForm">
      <div>
        <mat-form-field>
          <textarea
                  matInput
                  cdkTextareaAutosize
                  cdkAutosizeMinRows="2"
                  cdkAutosizeMaxRows="4"
                  formControlName="suggestion"
                  class="form-control"
                  required
                  placeholder="Write Here"
                  (focusout)="updateSuggestion()"
                  #explain
          ></textarea>
        </mat-form-field>
      </div>
      <br />
      <div>
        <button
          type="submit"
          mat-raised-button
          class="btn continue-btn"
          *ngIf="explain.value"
          [ngStyle]="{ float: 'right' }"
          (click)="onSubmit()"
        >
          Done
        </button>
      </div>
    </form>
  </ng-template>
</mat-expansion-panel>

<mat-card class="card-body" *ngIf="!panel.expanded && submitted">
  <mat-card-content>
    <div [ngStyle]="{ 'font-size': '12px' }">Summary</div>
    <div [ngStyle]="{ 'margin-top': '8px', 'font-size': '12px' }">
      {{ suggestion }}
    </div>
  </mat-card-content>
</mat-card>
