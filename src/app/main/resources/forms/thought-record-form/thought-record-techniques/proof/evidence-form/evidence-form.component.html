<div class="q-heading">
  {{ title }}
</div>
<div>
  <form [formGroup]="evidenceForm">
    <div
      class="statements"
      formArrayName="evidences"
      *ngFor="let statement of getStatements(); let i = index"
    >
      <div
        [formGroupName]="i"
        class="statement"
        [ngStyle]="{ display: 'flex' }"
        click-outside
        (clickOutside)="onClickOutside($event, i)"
      >
        <!--        <input type="hidden" formControlName="id" [value]="id" />-->
        <textarea
          matInput
          cdkTextareaAutosize
          cdkAutosizeMinRows="2"
          cdkAutosizeMaxRows="4"
          formControlName="statement"
          class="form-control"
          placeholder="Type Here"
          required
          (focus)="onShowTrashIcon(i)"
        ></textarea>

        <div
          id="trash-icon"
          (click)="markForDeletion(statement.value, i)"
          *ngIf="showTrashIcon[i]"
        >
          <mat-icon>delete</mat-icon>
        </div>
      </div>
    </div>
  </form>
</div>
<div class="add-evidence" (click)="addField()">
  <mat-icon
    [ngStyle]="{
      'font-size': '19px',
      'padding-top': '2px',
      cursor: 'pointer'
    }"
    >add</mat-icon
  >
  <div [ngStyle]="{ 'padding-left': '5px' }">
    Add Evidence
  </div>
</div>

<div></div>
