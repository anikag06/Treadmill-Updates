<mat-expansion-panel
  hideToggle
  #panel
  (afterExpand)="techniqueExpanded.emit()"
  (afterCollapse)="panelCollapse()"
>
  <mat-expansion-panel-header
    [ngStyle]="{ background: '#EBEDFF', paddingLeft: '16px' }"
  >
    <mat-panel-title
      [ngStyle]="{
        'font-size': panel.expanded ? '16px' : '14px',
        'font-weight': '500'
      }"
    >
      {{ techniqueName }}
    </mat-panel-title>
    <mat-panel-description>
      <div class="iconsDiv" *ngIf="panel.expanded">
        <mat-icon>close</mat-icon>
      </div>
      <div class="iconsDiv" *ngIf="!panel.expanded && this.summary.length > 0">
        <img src="assets/forms/edit_errors.png" width="24px" />
      </div>
    </mat-panel-description>
  </mat-expansion-panel-header>

  <ng-template matExpansionPanelContent>
    <form [formGroup]="outcomeRecordForm">
      <div class="q-heading">
        {{ worstOutcomeQuestion }}
      </div>
      <div>
        <mat-form-field>
          <textarea
            matInput
            #formInput="matInput"
            [placeholder]="formInput.focused ? 'Write Here' : ''"
            cdkTextareaAutosize
            cdkAutosizeMinRows="2"
            cdkAutosizeMaxRows="4"
            formControlName="worstOutcome"
            class="form-control"
            required
            #outcome
          ></textarea>
        </mat-form-field>
      </div>
      <br />
      <div class="q-heading">
        {{ bestOutcomeQuestion }}
      </div>
      <div>
        <mat-form-field>
          <textarea
            matInput
            #formInput="matInput"
            [placeholder]="formInput.focused ? 'Write Here' : ''"
            cdkTextareaAutosize
            cdkAutosizeMinRows="2"
            cdkAutosizeMaxRows="4"
            formControlName="bestOutcome"
            class="form-control"
            required
            #outcome
          ></textarea>
        </mat-form-field>
      </div>
      <br />
      <div class="q-heading">
        {{ likelyOutcomeQuestion }}
      </div>
      <div>
        <mat-form-field>
          <textarea
            matInput
            #formInput="matInput"
            [placeholder]="formInput.focused ? 'Write Here' : ''"
            cdkTextareaAutosize
            cdkAutosizeMinRows="2"
            cdkAutosizeMaxRows="4"
            formControlName="likelyOutcome"
            class="form-control"
            required
            placeholder="Write Here"
            #outcome
          ></textarea>
        </mat-form-field>
      </div>
      <br />
      <div>
        <button
          type="submit"
          mat-raised-button
          class="btn continue-btn"
          *ngIf="outcomeRecordForm.valid"
          [ngStyle]="{ float: 'right' }"
          (click)="onSubmit()"
        >
          Done
        </button>
      </div>
    </form>
  </ng-template>
</mat-expansion-panel>

<app-summary-card
  [cardHeading]="summaryHeading"
  [summary]="summary"
  [expanded]="panel.expanded"
></app-summary-card>
