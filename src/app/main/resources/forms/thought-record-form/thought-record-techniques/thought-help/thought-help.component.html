<mat-expansion-panel
  hideToggle
  #panel
  (afterExpand)="techniqueExpanded.emit()"
  (afterCollapse)="techniqueCollapsed.emit(summary)"
>
  <mat-expansion-panel-header
    [ngStyle]="{ background: '#FEDEFF', paddingLeft: '16px' }"
  >
    <mat-panel-title
      [ngStyle]="{
        'font-size': panel.expanded ? '16px' : '14px',
        'font-weight': '500'
      }"
    >
      {{ techniqueName }}
    </mat-panel-title>
    <mat-panel-description>
      <div class="iconsDiv" *ngIf="panel.expanded">
        <mat-icon>close</mat-icon>
      </div>
      <div class="iconsDiv" *ngIf="!panel.expanded && this.summary.length > 0">
        <img src="assets/forms/edit_errors.png" width="24px" />
      </div>
    </mat-panel-description>
  </mat-expansion-panel-header>

  <ng-template matExpansionPanelContent>
    <form [formGroup]="thoughtHelpForm">
      <div class="q-heading">
        {{ keepThoughtQues }}
      </div>
      <div>
        <mat-form-field>
          <textarea
            matInput
            #formInput="matInput"
            [placeholder]="
              formInput.focused || formInput.empty ? 'Write Here' : ''
            "
            cdkTextareaAutosize
            cdkAutosizeMinRows="1"
            formControlName="keepThought"
            class="py-0"
            required
            placeholder="Write Here"
            #outcome
          ></textarea>
        </mat-form-field>
      </div>
      <br />
      <div class="q-heading">
        {{ changeThoughtQues }}
      </div>
      <div>
        <mat-form-field>
          <textarea
            matInput
            #formInput="matInput"
            [placeholder]="
              formInput.focused || formInput.empty ? 'Write Here' : ''
            "
            cdkTextareaAutosize
            cdkAutosizeMinRows="1"
            formControlName="changeThought"
            class="py-0"
            required
            placeholder="Write Here"
            #outcome
          ></textarea>
        </mat-form-field>
      </div>
      <br />
      <div class="q-heading">
        {{ canSolveQues }}
      </div>
      <div>
        <mat-radio-group formControlName="canSolve" color="primary">
          <mat-radio-button [value]="true">
            Yes
          </mat-radio-button>
          <mat-radio-button [value]="false" [ngStyle]="{ marginLeft: '5%' }">
            No
          </mat-radio-button>
        </mat-radio-group>
      </div>
      <br />
      <div>
        <div
          *ngIf="thoughtHelpForm.value['canSolve'] === true"
          [innerHTML]="yes"
        ></div>
        <div *ngIf="thoughtHelpForm.value['canSolve'] === false">
          {{ no }}
        </div>
      </div>
      <br />
      <div>
        <button
          type="submit"
          mat-raised-button
          class="btn continue-btn"
          *ngIf="thoughtHelpForm.valid"
          [ngStyle]="{ float: 'right' }"
          (click)="onSubmit()"
        >
          Done
        </button>
      </div>
    </form>
  </ng-template>
</mat-expansion-panel>

<app-summary-card
  [cardHeading]="summaryHeading"
  [summary]="summary"
  [expanded]="panel.expanded"
></app-summary-card>
