<mat-card class="container-fluid px-0 pt-0 pb-2 mb-2">
  <div class="row no-gutters mb-2 card card-full-width">
    <mat-card-header class="col-12 w-100 px-0 card-header main-heading">
      <mat-card-title class="ml-4 my-auto d-inline-block">
        {{formName}}
      </mat-card-title>

      <div class="h-100 d-inline-block ml-auto">
        <button class="h-100 saved-forms-btn" mat-button [matMenuTriggerFor]="thoughtRecordForms">
          <i class="material-icons more-hor-icon">
            more_horiz
          </i>
        </button>
      </div>

      <mat-menu xPosition="before" yPosition="below" #thoughtRecordForms="matMenu" [overlapTrigger]="false">
        <div [ngStyle]="{'max-height': '350px'}">
          <!-- <app-forms-sidebar [type]="type" (objectEmitter)="thoughtSelected($event)" (newForm)="onAddNewForm()">
          </app-forms-sidebar> -->
        </div>
      </mat-menu>
    </mat-card-header>
  </div>

  <div class="row no-gutters form-div mx-auto">
    <div class="col-12 col-lg">
      <div class="row mb-2">
        <div class="col-12">
          <div class="card-full-width">
            <div class="card-header">
              What happened?
              <div class="float-right d-inline-block">
                <mat-icon class="edit_icon" (click)="onEditSituationClick()">
                  edit </mat-icon>
              </div>
            </div>
            <div class="card-body" *ngIf="situation && !situationEditMode" (click)="onSituationClick()">
              <div class="form-editable-text-underline">
                {{situation}}
              </div>
            </div>
            <div class="card-body" *ngIf="situation && situationEditMode" (click)="onSituationClick()">
              <app-trf-situation [situation]="situation"></app-trf-situation>
            </div>
            <div class="card-body" *ngIf="!situation" (click)="onSituationClick()">
              <app-trf-situation></app-trf-situation>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</mat-card>
