<div class="card-full-width">
  <div class="card-header">
    {{ header }}
    <div class="edit-icon">
      <button mat-icon-button class="edit_icon" (click)="onEditSituationClick()">
<!--      <mat-icon class="edit_icon" (click)="onEditSituationClick()">-->
<!--        edit-->
<!--      </mat-icon>-->
        <img src="assets/forms/svg/edit%201.svg" >
      </button>
    </div>
  </div>
  <div class="card-body">
    <form [formGroup]="thoughtRecordForm">
      <mat-form-field class="full-width">
        <textarea
          matInput
          #formInput="matInput"
          [placeholder]="
            formInput.focused || formInput.empty ? 'Write Here' : ''
          "
          name="problemStatement"
          class="py-0"
          #thoughtTextArea
          cdkTextareaAutosize
          cdkAutosizeMinRows="1"
          formControlName="thought"
          (focus)="onShowContinueButton()"
          required
        ></textarea>
      </mat-form-field>
      <p class="text-right">
        <button
          mat-raised-button
          type="button"
          *ngIf="showContinueButton"
          class="btn continue-btn"
          (click)="onThoughtSubmit()"
        >
          <ng-container *ngIf="!showLoading; else loading"
            >Continue
          </ng-container>
          <ng-template #loading>
            <span class="spinner-border spinner-border-sm"></span>
            Loading.. &nbsp;
          </ng-template>
        </button>
      </p>
    </form>

    <app-form-slider
      [minRatingText]="minRating"
      [maxRatingText]="maxRating"
      [question]="scaleThought"
      *ngIf="showSlider"
      (getRating)="getRating($event)"
      [rating]="negativeMoodRating"
    ></app-form-slider>
    <div *ngIf="showSliderButton">
      <div class="text-right">
        <button
          mat-raised-button
          (click)="onThoughtRatingSubmit()"
          class="btn continue-btn"
        >
          <ng-container *ngIf="!showRatingSpinner; else loading"
            >Continue
          </ng-container>
          <ng-template #loading>
            <span class="spinner-border spinner-border-sm"></span>
            Loading..
          </ng-template>
        </button>
      </div>
    </div>
    <br />
  </div>
</div>
