<mat-expansion-panel hideToggle #panel>
    <mat-expansion-panel-header
            [ngStyle]="{ background: '#FFFCE3 ', paddingLeft: '16px' }"
            [expandedHeight]="'42px'"
            [collapsedHeight]="'42px'"
    >
        <mat-panel-title
                [ngStyle]="{
        'font-size': panel.expanded ? '16px' : '14px',
        'font-weight': '500'
      }"
        >
            What is the proof?
        </mat-panel-title>
        <mat-panel-description>
            <div class="iconsDiv" *ngIf="panel.expanded">
                <mat-icon>close</mat-icon>
            </div>
            <div class="iconsDiv" *ngIf="!panel.expanded && summary">
                <img src="assets/forms/edit_errors.png" width="24px"/>
            </div>
        </mat-panel-description>
    </mat-expansion-panel-header>

    <ng-template matExpansionPanelContent>
        <form [formGroup]="proofStatementForm">
            <div>
                <app-belief-evidences
                        [title]="favorTitle"
                        [control]="favorEvidences"
                        [type]="forType"
                        [belief]="belief"
                        (setSummary)="setSummary()"
                ></app-belief-evidences>
                <br/><br/>
                <app-belief-evidences
                        [title]="againstTitle"
                        [control]="againstEvidences"
                        [type]="againstType"
                        [belief]="belief"
                        (setSummary)="setSummary()"
                ></app-belief-evidences>
            </div>
            <br/><br/>

            <button
                    mat-raised-button
                    class="btn continue-btn"
                    [ngStyle]="{ float: 'right' }"
                    (click)="onSubmit()"
            >
                Done
            </button>
        </form>
        <br/><br/>
    </ng-template>
</mat-expansion-panel>

<mat-card class="card-body" *ngIf="!panel.expanded && this.summary">
    <mat-card-content>
        <div [ngStyle]="{ 'font-size': '12px' }">
            Summary
        </div>
        <div [ngStyle]="{ 'margin-top': '8px', 'font-size': '12px' }">
            {{ summary }}
        </div>
    </mat-card-content>
</mat-card>
