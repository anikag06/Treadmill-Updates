<form>
  <mat-form-field class="full-width">
    <textarea name="worryStatement" class="py-0" #worryTextArea
              cdkTextareaAutosize
              cdkAutosizeMinRows="1"
              cdkAutosizeMaxRows="5"
              id="worryStatement" placeholder="Write here"
              matInput required [autofocus] [(ngModel)]="worryStatement" 
              (focusout)="onFocusOut($event)">text</textarea>
  </mat-form-field>
  <p class="text-right"  (click)="onWorrySubmit()">
    <button type="button" mat-raised-button color="primary"
      class="continue-btn"  >Continue</button>
  </p>
  </form>
