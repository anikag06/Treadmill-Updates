<mat-card class="container-fluid px-0 pt-0 pb-2 mb-2">
  <div class="row no-gutters mb-2 card card-full-width">
    <mat-card-header class="col-12 w-100 px-0 card-header main-heading">
      <mat-card-title class="ml-4 my-auto d-inline-block">
        Worry Productively form
      </mat-card-title>
      <div class="h-100 d-inline-block ml-auto">
        <button class="h-100 saved-forms-btn" mat-button [matMenuTriggerFor]="worryProductivelyForms">
          <i class="material-icons more-hor-icon">
            more_horiz
          </i>
        </button>
      </div>


      <mat-menu xPosition="before" yPosition="below" #worryProductivelyForms="matMenu" [overlapTrigger]="false">
        <div [ngStyle]="{'max-height':'350px'}">
          <app-forms-sidebar [type]="type" (objectEmitter)="worrySelected($event)" (newForm)="onAddNewForm()" [object]="worry">
          </app-forms-sidebar>
        </div>
      </mat-menu>
    </mat-card-header>
  </div>

  <div class="row no-gutters form-div mx-auto">
    <div class="col-12 col-lg">
      <div class="row mb-2">
        <div class="col-12">
          <div class="card-full-width">
            <div class="card-header">
                <strong>What are you worried about?</strong>
              <div class="float-right d-inline-block">
                <mat-icon class="edit_icon" (click)="onEditWorryClick()">
                  edit </mat-icon>
              </div>
            </div>
            <!-- <div class="card-body" *ngIf="worry && !worryEditMode" (click)="onWorryClick()">
              <div class="form-editable-text-underline">
                {{worry.worry}}
              </div> <br />
              <app-form-slider [question]="worrySliderQuestion" [minRatingText]="wSliderMinRangeText"
                [maxRatingText]="wSliderMaxRangeText" [rating]="worry.worry_rating_initial">
              </app-form-slider>
            </div> -->
            <div class="card-body" *ngIf="worry " (click)="onWorryClick()">
              <app-worry-form [worry]="worry" (testOut)="continueAfterSlider($event)"></app-worry-form>
            </div>
            <div class="card-body" *ngIf="!worry" (click)="onWorryClick()">
              <app-worry-form (testOut)="continueAfterSlider($event)"></app-worry-form>
            </div>

          </div>
        </div>
      </div>
      <div class="row mb-2" *ngIf="buttonClick">
        <div class="col-12">
          <div class="card-full-width">
            <div class="card-header">
              Tick all the useless characteristics of your worry?
            </div>

            <!-- <mat-checkbox [checked]="i.checked" (change)="OnCharacteristicCheck($event)" #Checkbox >
                        {{i}}
                        </mat-checkbox> -->
            <form [formGroup]="uselessCharacteristicsForm">
              <div formArrayName="characteristics" *ngFor="let val of data; let i = index "><br />
                <mat-checkbox [value]="val.value" (change)="updateValueChange($event,i)" [checked]="val.is_checked">
                  {{val.value }} 
                </mat-checkbox>

              </div>
              <p class="text-right" (click)="OnCharacteristicCheck()">
                <button type="button" mat-raised-button color="primary" class="continue-btn">Continue</button>
              </p>
            </form>
          </div>
        </div>
      </div>
      <app-techniques [techniquesCall]= "characteristicCheck" [worry]="worry" (originalWorry)="showOriginalWorry($event)"></app-techniques>
      <p class="text-right" (click)="onOriginalWorry()" *ngIf="!originalWorryClick && originalWorryContinue">
        <button type="button" mat-raised-button color="primary" class="continue-btn" >Continue</button> <br/> <br/>
      </p>
    </div>
  </div>
  <div class="row no-gutters form-div mx-auto" *ngIf="originalWorryClick">
    <div class="col-12 col-lg">
      <div class="row mb-2">
        <div class="col-12">
          <div class="card-full-width">
            <div class="card-header" >
              How bothered are you by your worry? 
            </div>
            <div class = "card-body" >
              <div class="worryBox" *ngIf = "worry"> 
                 <div class="worryText"><br/> Your original worry <br/> 
                    <div class="worrybody">{{worry.worry}} <br/>
                    </div>
                 </div>
              </div>
            </div>
            <div class = "card-body" *ngIf = "sliderResponse == undefined ">
              <app-form-slider [question]="worrySliderQuestion" [minRatingText]="wSliderMinRangeText"
              [maxRatingText]="wSliderMaxRangeText" >
              </app-form-slider>
            </div>
            <div class = "card-body" *ngIf = "sliderResponse != undefined">
              <app-form-slider [question]="worrySliderQuestion" [minRatingText]="wSliderMinRangeText"
              [maxRatingText]="wSliderMaxRangeText" [rating]="sliderResponse">
              </app-form-slider>
            </div>
            <div class = "card-body">
              <p class="text-right" (click)="OnFinalSliderClick()">
                <button type="button" mat-raised-button color="primary" class="continue-btn">Continue</button>
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
    
</mat-card>
