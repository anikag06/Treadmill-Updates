<div class="forms-container">
  <mat-card
    class="container-fluid px-0 pt-0 pb-2 mb-2"
    [ngClass]="{ 'for-slide': fromSlide || fromConv }"
  >
    <div class="row mb-2 card card-full-width">
      <mat-card-header class="col-12 w-100 px-0 py-0 card-header main-heading">
        <mat-card-title class="ml-4 my-auto py-2 d-inline-block">
          Worry Productively form
        </mat-card-title>
        <div class="h-100 d-inline-block ml-auto">
          <div *ngIf="showFollowUp && !t.menuOpen" class="red-circle"></div>
          <button
            class="saved-forms-btn"
            mat-icon-button
            [matMenuTriggerFor]="worryProductivelyForms"
            #t="matMenuTrigger"
          >
            <mat-icon>
              more_horiz
            </mat-icon>
          </button>
        </div>

        <mat-menu
          xPosition="before"
          yPosition="below"
          #worryProductivelyForms="matMenu"
          [overlapTrigger]="false"
        >
          <div [ngStyle]="{ 'max-height': '350px' }">
            <app-forms-sidebar
              [type]="type"
              (objectEmitter)="worrySelected($event)"
              (showDot)="onShowFollowUp($event)"
              (newForm)="onAddNewForm()"
              [object]="worry"
            >
            </app-forms-sidebar>
          </div>
        </mat-menu>
      </mat-card-header>
    </div>

    <div class="row no-gutters form-div mx-auto">
      <div *ngIf="showLoading" class="col-12 text-center text-loading">
        Loading...
      </div>

      <div
        class="col-12 col-lg"
        [ngStyle]="{ visibility: showLoading ? 'hidden' : 'visible' }"
      >
        <div class="row mb-5">
          <div class="col-12">
            <div class="card-full-width">
              <div class="card-header">
                <strong>What are you worried about?</strong>
                <div class="float-right d-inline-block position-absolute" [ngStyle]="{ right: '20px', top: '6px' }">
                  <button mat-icon-button class="edit_icon" (click)="onEditWorryClick()">
<!--                  <mat-icon class="edit_icon" (click)="onEditWorryClick()">-->
<!--                    edit-->
<!--                  </mat-icon>-->
                    <img src="assets/forms/svg/edit%201.svg" >
                  </button>
                </div>
              </div>
              <div class="card-body" (click)="onWorryClick()">
                <app-worry-form
                  [worry]="worry"
                  (testOut)="continueAfterSlider($event)"
                  (updateWorry)="updateWorry($event)"
                ></app-worry-form>
              </div>
            </div>
          </div>
        </div>
        <div class="row mb-2" *ngIf="buttonClick">
          <div class="col-12">
            <div class="card-full-width">
              <div class="card-header">
                Tick all the useless characteristics of your worry?
              </div>
              <br />
              <div
                class="characteristics"
                [formGroup]="uselessCharacteristicsForm"
              >
                <div
                  formArrayName="characteristics"
                  *ngFor="let val of data; let i = index"
                  class="my-2"
                >
                  <mat-checkbox
                    [value]="val.value"
                    (change)="updateValueChange($event, i)"
                    [checked]="val.is_checked"
                    color="primary"
                  >
                    {{ val.value }}
                  </mat-checkbox>
                </div>

                <p
                  class="text-right"
                  (click)="OnCharacteristicCheck()"
                  *ngIf="checkBoxContinue"
                >
                  <button type="button" mat-raised-button class="continue-btn">
                    <ng-container *ngIf="!showSpinner; else loading"
                      >Done
                    </ng-container>
                    <ng-template #loading>
                      <span class="spinner-border spinner-border-sm"></span>
                      Loading..
                    </ng-template>
                  </button>
                </p>
              </div>
            </div>
          </div>
        </div>
        <br />
        <app-techniques
          (onOriginalWorry)="onOriginalWorry()"
          [techniquesCall]="characteristicCheck"
          [worry]="worry"
          (originalWorry)="showOriginalWorry($event)"
        ></app-techniques>
        <!--      <p class="text-right" (click)="onOriginalWorry()" *ngIf="!originalWorryClick && originalWorryContinue">-->
        <!--        <button type="button" mat-raised-button class="continue-btn">Continue</button> <br /> <br />-->
        <!--      </p>-->
      </div>
    </div>
    <div class="row no-gutters form-div mx-auto" *ngIf="originalWorryClick">
      <div class="col-12 col-lg">
        <div class="row mb-2">
          <div class="col-12">
            <div class="card-full-width">
              <div class="card-header">
                How bothered are you by your worry?
              </div>
              <div class="card-body">
                <div class="worryBox" *ngIf="worry">
                  <div
                    class="worryText my-1 px-2"
                    [ngStyle]="{ fontSize: '12px' }"
                  >
                    Your original worry
                  </div>
                  <div class="worrybody px-2 mb-1">
                    {{ worry.worry }} <br />
                  </div>
                </div>
              </div>
              <div
                class="card-body"
                *ngIf="sliderResponseFinal === undefined"
                (click)="hideFinalSliderCont()"
              >
                <app-form-slider
                  [question]="worrySliderQuestion"
                  [minRatingText]="wSliderMinRangeText"
                  [maxRatingText]="wSliderMaxRangeText"
                >
                </app-form-slider>
              </div>
              <div
                class="card-body"
                *ngIf="sliderResponseFinal !== undefined"
                (click)="hideFinalSliderCont()"
              >
                <app-form-slider
                  [question]="worrySliderQuestion"
                  [minRatingText]="wSliderMinRangeText"
                  [maxRatingText]="wSliderMaxRangeText"
                  [rating]="sliderResponseFinal"
                >
                </app-form-slider>
              </div>
              <div class="card-body" *ngIf="finalSliderCont">
                <p class="text-right" (click)="OnFinalSliderClick()">
                  <button type="button" mat-raised-button class="continue-btn">
                    <ng-container *ngIf="!showRatingSpinner; else loading"
                      >Continue
                    </ng-container>
                    <ng-template #loading>
                      <span class="spinner-border spinner-border-sm"></span>
                      Loading..
                    </ng-template>
                  </button>
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="mb-4">
        <app-form-message *ngIf="showMessage" [formMessage]="message">
        </app-form-message>
        <app-form-quote
          *ngIf="showMessage"
          [quote]="quote"
          [quotedBy]="quotedBy"
        ></app-form-quote>
      </div>
    </div>
  </mat-card>
</div>
