<mat-expansion-panel
  hideToggle="true"
  #panel5
  (afterExpand)="techniqueExpanded.emit()"
  (afterCollapse)="panelCollapse()"
>
  <mat-expansion-panel-header style="background: #C9FFDA;position:relative">
    <mat-panel-description>
      <strong> Deal with intense worry </strong>
    </mat-panel-description>
    <button class="iconsDiv" mat-icon-button *ngIf="panel5.expanded" >
    <mat-icon svgIcon="Close"></mat-icon>
    </button>
    <button class="edit_icon iconsDiv" mat-icon-button *ngIf="!panel5.expanded && summaryText" style="top:6px" >
<!--    <mat-icon-->
<!--      svgIcon="EditErrors"-->
<!--    ></mat-icon>-->
      <img src="assets/forms/svg/edit%201.svg" >
    </button>
  </mat-expansion-panel-header>
  <ng-template matExpansionPanelContent>
    <div class="card-body" style="padding: 15px 2px 16px; color:#00000099;">
      <div>
        <strong>Distract Myself</strong> <br />
        <br />
        It might help to distract myself if my worry gets very intense. What can
        I do to distract myself?
      </div>
      <br />
      <mat-form-field class="full-width" [formGroup]="DealWorryForm">
        <textarea
          class="py-0"
          formControlName="DealWorryStatement"
          #isText
          cdkTextareaAutosize
          cdkAutosizeMinRows="1"
          matInput
          #formInput="matInput"
          [placeholder]="
            formInput.focused || formInput.empty ? 'Write Here' : ''
          "
          required
          [autofocus]
          (focus)="onFocus()"
        ></textarea>
      </mat-form-field>
      <p
        class="text-right"
        (click)="ondealWorrySubmit()"
        *ngIf="isText.value && continueButton"
      >
        <button type="button" mat-raised-button class="continue-btn">
          Done
        </button>
      </p>
      <div *ngIf="calmMyself">
        <strong>Calm Myself</strong><br />
        <br />
        If worry gets very intense, do mindful breathing exercises <a href="https://www.treadwill.org/main/extra-resources">here</a>.
        <p class="text-right">
          <button
            type="button"
            mat-raised-button
            class="continue-btn"
            (click)="continuetocalmMyself()"
          >
            Done
          </button>
        </p>
      </div>
    </div>
  </ng-template>
</mat-expansion-panel>
<mat-card class="card-body" *ngIf="!panel5.expanded && summaryText">
  <mat-card-content>
    <div [ngStyle]="{ 'font-size': '12px' }">
      Summary
    </div>
    <div [ngStyle]="{ 'margin-top': '8px', 'font-size': '12px' }">
      {{ summaryText }}
    </div>
  </mat-card-content>
</mat-card>
<br />
