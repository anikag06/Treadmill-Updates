<mat-expansion-panel hideToggle="true" #panel3>
  <mat-expansion-panel-header style="background: #E2E5FF;" >
    <mat-panel-description>
      <strong> Modify Beliefs </strong>
    </mat-panel-description>
    <mat-icon *ngIf="panel3.expanded" svgIcon="Close"></mat-icon>
    <mat-icon *ngIf="!panel3.expanded && summaryText" svgIcon="EditErrors"></mat-icon>
  </mat-expansion-panel-header>
  <ng-template matExpansionPanelContent >
  <div class="card-body" >
    <div>
      Why do I worry so much? What will happen if I didn't worry?
    </div> <br />
    <mat-form-field class="full-width" [formGroup]="beliefForm">
      <textarea class="py-0" formControlName="beliefStatement" #isText cdkTextareaAutosize cdkAutosizeMinRows="1"
        cdkAutosizeMaxRows="5" placeholder="Write here" matInput required [autofocus]
        ></textarea>
    </mat-form-field>
    <span class="span-rating-text">
      You can also use belief change form</span>
    <p class="text-right" (click)="onBeliefSubmit()" *ngIf="isText.value">
      <button type="button" mat-raised-button color="primary" class="continue-btn">Done</button>
    </p>
  </div>
</ng-template>
</mat-expansion-panel>
<mat-card class="card-body" *ngIf="!panel3.expanded && summaryText">
  <mat-card-content>
      <div [ngStyle]="{ 'font-size': '12px' }">
          Summary
      </div>
      <div [ngStyle]="{ 'margin-top': '8px', 'font-size': '12px' }">
          {{ summaryText }}
      </div>
  </mat-card-content>
</mat-card> <br/>
