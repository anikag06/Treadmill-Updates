<form *ngIf="EvaluatedClicked">
  <div class="card-body" *ngIf="!summary">
    <div>
      Can you identify the Thinking Errors in your negative thoughts?
    </div> <br />
    <div *ngFor="let i of item">
      <mat-checkbox>
        {{i}}
      </mat-checkbox>
    </div>
    <p class="text-right" (click)="CheckSubmit()">
      <button type="button" mat-raised-button color="primary" class="continue-btn">Continue</button>
    </p> <br /> <br />
    <div *ngIf="checksubmitted">
      Gather evidence <br /><br />
      <!-- <div class= "card-body" *ngIf="evaluateEvidence && EvaluateEditMode" (click)="onEvaluateClick()">
                    <app-worry-form [problem]="evaluateEvidence"></app-worry-form>
                </div>
                <div class= "card-body" *ngIf="!evaluateEvidence" (click)="onEvaluateClick()">
                    <app-worry-form (testOut)="continuetoSlider($event)"></app-worry-form>
               </div> -->
      <mat-form-field class="full-width">
        <textarea name="evaluateStatement" class="py-0" #isText cdkTextareaAutosize cdkAutosizeMinRows="1"
          cdkAutosizeMaxRows="5" id="evaluateStatement" placeholder="Write here" matInput required [autofocus]
          [(ngModel)]="evaluateStatement" (focusout)="onFocusOut($event)">text</textarea>
      </mat-form-field>
      <p class="text-right" (click)="onEvaluateSubmit()" *ngIf="isText.value">
        <button type="button" mat-raised-button color="primary" class="continue-btn">Continue</button>
      </p>
    </div> <br />
    <div *ngIf="buttonClick" style="color:#00000099; letter-spacing:0.14px;">
      <br />
      <app-form-slider [question]="evaluateSliderQuestion" [minRatingText]="evaSliderMinRangeText"
        [maxRatingText]="evaSliderMaxRangeText"></app-form-slider>
      <p class="text-right" (click)="onSliderSubmit()">
        <button type="button" mat-raised-button color="primary" class="continue-btn">Continue</button>
      </p>
    </div> <br />
  </div>
  <div *ngIf="summary">
    Accept uncertainity <br /><br />
    <!-- <div class= "card-body" *ngIf="evaluateEvidence && EvaluateEditMode" (click)="onEvaluateClick()">
                      <app-worry-form [problem]="evaluateEvidence"></app-worry-form>
                  </div>
                  <div class= "card-body" *ngIf="!evaluateEvidence" (click)="onEvaluateClick()">
                      <app-worry-form (testOut)="continuetoSlider($event)"></app-worry-form>
                  </div> -->
    {{evaluateStatement}}
  </div>
</form>
