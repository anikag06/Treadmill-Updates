<div *ngIf="techniquesCall">
  <div class="row mb-2">
    <div class="col-12">
      <div class="card-full-width">
        <div class="card-header" style="background: #FBE9C8;">
          <strong> Select a technique that you would like to use to reduce your worry? </strong>
          <div class="float-right d-inline-block">
            <mat-icon class="edit_icon">
              edit </mat-icon>
          </div>
        </div>
        <div class="card-body">
          You can evaluate your worry thought with multiple techniques.
          <div class="float-right d-inline-block" #doneBtn>
            <mat-icon svgIcon="Info" class="edit_icon" (click)="techniqueInfo()">
            </mat-icon>
          </div> <br /> <br />
          
              <app-evaluate-worry  [worry]="worry">
              </app-evaluate-worry>
           
        
          
              <app-face-my-worst-fear [worry]="worry"></app-face-my-worst-fear>
          
              <app-modify-beliefs [worry]="worry">
              </app-modify-beliefs>
            
            
              <app-wpf-problem-solving  [worry]="worry">
              </app-wpf-problem-solving>
            
                  
              <app-wpf-deal-with-worry (summaryDealingEvent)="setDealSummary($event)" [worry]="worry">
              </app-wpf-deal-with-worry>
