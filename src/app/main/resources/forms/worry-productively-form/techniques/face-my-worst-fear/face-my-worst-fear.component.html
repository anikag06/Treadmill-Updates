<mat-expansion-panel hideToggle="true" #panel2>
  <mat-expansion-panel-header style="background: #FEC1C1;">
    <mat-panel-description >
      <strong> Face my worst fear </strong><div class="circle" *ngIf="emergencyPlan === false && !disableEmergency"></div> 
    </mat-panel-description>
    <mat-icon *ngIf="panel2.expanded " svgIcon="Close"></mat-icon>
    <mat-icon *ngIf="!panel2.expanded && summaryText " svgIcon="EditErrors"></mat-icon>
  </mat-expansion-panel-header>
  <ng-template matExpansionPanelContent>
    <div class="card-body" style="padding: 15px 2px 16px;">
      <div class="headingText">
        Write down the worst fear in as much detail as possible. <br /> <br /> 
      </div>
      <div>
        <mat-form-field class="full-width" [formGroup]="faceYourWorstFearForm">
          <textarea class="py-0" formControlName="faceYourWorstFear" #fear cdkTextareaAutosize cdkAutosizeMinRows="1"
            cdkAutosizeMaxRows="5" placeholder="Write here" matInput required [autofocus]
            (focus)="onFocusfear()"></textarea>
        </mat-form-field>
        <p class="text-right" *ngIf="fear.value && continueButton" (click)="onWorstFearClick()">
          <button type="button" mat-raised-button class="continue-btn">Continue </button><br/><br/>
        </p>

      </div>
      <div *ngIf="showTasks">
        <app-tasks [taskHeading]="taskHeading" (showMessage)="taskSubmitted($event)" (taskLoaded)="taskLoaded($event)" [object]="taskObject" [task]="task"></app-tasks> <br /> <br />
      </div>
      <div class="headingText" *ngIf="taskEmitted">
        Write down the emergency plan (You can write the emergency plan after worrying regularly for 2-3 weeks). 
        <div class="position" *ngIf="!emergencyPlan && !disableEmergency"> 
          <div class="circle"></div>
        </div> <br />
        <br />
        <div *ngIf="disableEmergency" class="hideResult col-12 my-2"></div>
        <div *ngIf="disableEmergency" class="notice my-4"> 
          The Text to write emergency plan will be active after
          {{ getEndDate() }}. 
        </div>
        <p class="text-right" *ngIf="disableEmergency" (click)="onSummary()">
          <button type="button" mat-raised-button class="continue-btn">Done</button> <br/> <br/>
        </p>
        <div *ngIf="!disableEmergency">
          <mat-form-field class="full-width" [formGroup]="faceYourWorstFearForm">
            <textarea class="py-0" formControlName="emergency_plan" #Text cdkTextareaAutosize cdkAutosizeMinRows="1"
              cdkAutosizeMaxRows="5" placeholder="Write here" matInput required [autofocus] [disabled]="disableEmergency"
              (focus)="onFocusEmergency()"></textarea>
          </mat-form-field>
          <p class="text-right" *ngIf="Text.value && continueEmergency && !doneShowSummary " (click)="onEmergencyPlan()">
            <button type="button" mat-raised-button class="continue-btn">Continue</button>
          </p>
          <p class="text-right" *ngIf="doneShowSummary" (click)="onSummary()">
            <button type="button" mat-raised-button class="continue-btn">Done</button>
          </p>
        </div>
      </div>
    </div>
  </ng-template>
</mat-expansion-panel>

<mat-card class="card-body" *ngIf="!panel2.expanded && summaryText">
  <mat-card-content>
    <div [ngStyle]="{ 'font-size': '12px' }">
      Summary
    </div>
    <div [ngStyle]="{ 'margin-top': '8px', 'font-size': '12px' }">
      {{ summaryText }}
    </div>
  </mat-card-content>
</mat-card> <br />
