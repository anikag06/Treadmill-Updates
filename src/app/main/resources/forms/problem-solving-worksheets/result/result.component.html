<div class="row">
  <div class="col">
    <!-- <div class="card"> -->
    <div>
      <div class="card-header d-flex">
        What was the result of implementation?
        <div
          class="red-dot"
          *ngIf="!disableResult && resultBody.length < 1"
        ></div>
      </div>
      <div class="card-body">
        <div *ngIf="!disableResult">
          <mat-form-field class="full-width">
            <textarea
              matInput
              #formInput="matInput"
              [placeholder]="
                formInput.focused || formInput.empty ? 'Write Here' : ''
              "
              class="px-0 py-0"
              cdkTextareaAutosize
              #autosize="cdkTextareaAutosize"
              required
              name="result"
              [disabled]="disableResult"
              [(ngModel)]="resultBody"
            ></textarea>
          </mat-form-field>
          <div>
            Was your problem solved?

            <div>
              <mat-radio-group color="primary" [(ngModel)]="didWork">
                <mat-radio-button [value]="true">
                  Yes
                </mat-radio-button>
                <mat-radio-button
                  [value]="false"
                  [ngStyle]="{ marginLeft: '4rem' }"
                >
                  No
                </mat-radio-button>
              </mat-radio-group>
              <div class="my-2 text-center">
                <div *ngIf="didWork === true">
                  {{ yes }}
                </div>

                <div *ngIf="didWork === false">
                  {{ no }}
                </div>
              </div>
            </div>
          </div>
        </div>
        <div *ngIf="disableResult" class="hideResult col-12 my-2">Disabled</div>
        <div *ngIf="disableResult" class="notice my-4">
          Write the result of the implementation after
          {{ getEndDate() }}.
        </div>

        <p *ngIf="!disableResult" class="text-right" (click)="onResultSubmit()">
          <button
            *ngIf="showContinue()"
            type="button"
            mat-raised-button
            class="continue-btn"
          >
            Save
          </button>
        </p>
      </div>
    </div>
  </div>
</div>

<app-form-quote
  *ngIf="showMessage && !disableResult"
  [quote]="quote"
  [quotedBy]="quotedBy"
></app-form-quote>
