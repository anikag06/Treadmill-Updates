<div class="item">
  <div
    contenteditable="true"
    #editableDiv
    (focusout)="onFocusOut($event)"
    (focusin)="onFocus()"
    class="procon"
  >
    {{ procon.body }}
  </div>
  <button
    *ngIf="!hideRemove"
    class="pull-right delete-btn"
    (click)="removeProcon()"
  >
    <mat-icon>delete</mat-icon>
  </button>
</div>
