<div class="item">
  <button class="pull-right" (click)="removeProcon()" *ngIf="!hideRemove">
    <mat-icon>delete</mat-icon>
  </button>
  <div
    contenteditable="true"
    #editableDiv
    (focusout)="onFocusOut($event)"
    (focusin)="onFocus()"
    class="procon"
    (keydown.enter)="onFocusOut($event)"
  >
    {{ procon.body }}
  </div>
</div>
