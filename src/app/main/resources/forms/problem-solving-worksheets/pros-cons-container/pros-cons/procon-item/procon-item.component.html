<ul>
  <li>
    <div class="item" appClickOutside (clickOutside)="onClickOutside($event)">
      <div
        contenteditable="true"
        #editableDiv
        (focusout)="onFocusOut($event)"
        (focusin)="onFocus()"
        class="procon"
      >
        {{ procon.body }}
      </div>
      <div
        *ngIf="!hideRemove"
        class="pull-right delete-btn"
        (click)="removeProcon()"
      >
        <mat-icon>delete</mat-icon>
      </div>
    </div>
  </li>
</ul>
