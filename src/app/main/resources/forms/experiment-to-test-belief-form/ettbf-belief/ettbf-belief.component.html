<form>
  <mat-form-field class="full-width">
    <textarea
      name="beliefStatement"
      class="py-0"
      #beliefTextArea
      matInput
      #formInput="matInput"
      [placeholder]="formInput.focused || formInput.empty ? 'Write here' : ''"
      cdkTextareaAutosize
      cdkAutosizeMinRows="1"
      id="beliefStatement"
      required
      [autofocus]
      [(ngModel)]="beliefStatement"
      (focus)="onFocus()"
    ></textarea>
  </mat-form-field>
  <p class="text-right" *ngIf="beliefContinue">
    <button
      type="button"
      mat-raised-button
      class="continue-btn"
      (click)="onBeliefSubmit()"
    >
      Continue
    </button>
  </p>
  <div *ngIf="showSlider" (click)="showSliderCont()">
    <app-form-slider
      [question]="ratingQuestion"
      [minRatingText]="minRatingText"
      [maxRatingText]="maxRatingText"
      [rating]="value"
    ></app-form-slider>
  </div>
  <p
    class="text-right"
    *ngIf="sliderContinue"
  >
    <button type="button" mat-raised-button class="continue-btn"   (click)="onBeliefRatingBeforeSubmit()">
      <ng-container *ngIf="!showSpinner; else loading">Continue </ng-container>
      <ng-template #loading>
        <span class="spinner-border spinner-border-sm"></span>
        Loading..
      </ng-template>
    </button>
  </p>
</form>
