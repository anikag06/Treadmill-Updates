<form>
  <mat-form-field class="full-width">
    <textarea
      name="beliefStatement"
      class="py-0"
      #beliefTextArea
      cdkTextareaAutosize
      cdkAutosizeMinRows="1"
      cdkAutosizeMaxRows="5"
      id="beliefStatement"
      placeholder="I can't do anything"
      matInput
      required
      [autofocus]
      [(ngModel)]="beliefStatement"
    ></textarea>
  </mat-form-field>
  <p class="text-right" (click)="onBeliefSubmit()">
    <button type="button" mat-raised-button class="continue-btn">
      Continue
    </button>
  </p>
  <div class="slider-div">
    <span class="rating-question-text">How strongly do you believe this?</span>
    <br />
    <br />
    <mat-slider
      thumbLabel
      min="1"
      max="10"
      [(value)]="initialBeliefRating"
    ></mat-slider>
    <span class="rating-text rating-text-left-margin">Not at all</span>
    <span class="rating-text float-right">Very strongly</span>
  </div>
  <p class="text-right" (click)="onBeliefRatingSubmit()">
    <button type="button" mat-raised-button class="continue-btn">
      Continue
    </button>
  </p>
</form>
