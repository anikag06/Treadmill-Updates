<form>
  <mat-form-field class="full-width">
    <textarea
      name="beliefStatement"
      class="py-0"
      #beliefTextArea
      cdkTextareaAutosize
      cdkAutosizeMinRows="1"
      cdkAutosizeMaxRows="5"
      id="beliefStatement"
      placeholder="I can't do anything"
      matInput
      required
      [autofocus]
      [(ngModel)]="beliefStatement"
      (focus)="onFocus()"
    ></textarea>
  </mat-form-field>
  <p class="text-right" *ngIf="beliefContinue " >
    <button type="button" mat-raised-button class="continue-btn" (click)="onBeliefSubmit()">
      Continue
    </button>
  </p>
  <div *ngIf="showSlider" (click)="showSliderCont()">
    <app-form-slider 
      [question]="ratingQuestion"
      [minRatingText]="minRatingText"
      [maxRatingText]="maxRatingText"
      [rating] = "value"
    ></app-form-slider>
  </div> 
  <p class="text-right" *ngIf="sliderContinue" (click)="onBeliefRatingBeforeSubmit()">
    <button type="button" mat-raised-button class="continue-btn">
      Continue
    </button>
  </p>
</form>
