<ul class="list-group" id="forms-data">
  <div id="add-new-form">
    <button mat-menu-item (click)="onAddNewForm()">
      Create new form
    </button>
  </div>
  <div id="delete-form">
    <button mat-menu-item [disabled]="!object" (click)="onDeleteForm(object)">
      Delete form
    </button>
  </div>
  <mat-accordion (click)="$event.stopPropagation()">
    <mat-expansion-panel [hideToggle]="objects.length < 1" #panel>
      <mat-expansion-panel-header>
        Saved Forms
        <div class="red-circle" *ngIf="this.show_dot && !panel.expanded"></div>
      </mat-expansion-panel-header>
      <ng-template matExpansionPanelContent>
        <div
          mat-menu-item
          *ngFor="let obj of objects; let i = index"
          class="d-flex px-0"
          [disabled]="obj === selectedObject"
          (click)="problemClicked(obj)"
          [ngClass]="obj === selectedObject ? 'selected' : ''"
        >
          <button class="btn" [ngStyle]="{ boxShadow: 'none' }">
            {{ i + 1 }}.
            {{
              (
                obj.problem ||
                obj.name ||
                obj.situation ||
                obj.belief ||
                obj.worry
              ).substring(0, 20)
            }}
          </button>
          <div
            [ngStyle]="{ top: '12px', right: '10px' }"
            class="position-relative red-circle"
            *ngIf="obj.show_follow_up_dot ? obj.show_follow_up_dot : false"
          ></div>
        </div>
      </ng-template>
    </mat-expansion-panel>
  </mat-accordion>
  <!-- </div> -->
</ul>
