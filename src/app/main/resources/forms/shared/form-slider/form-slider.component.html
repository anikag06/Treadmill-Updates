<div>
  <div class="rating-question-text">{{ question }}</div>
  <br />
  <mat-slider
    thumbLabel
    min="1"
    max="10"
    [(value)]="rating"
    (change)="onInputChange($event)"
  ></mat-slider>

  <div [ngStyle]="{ display: 'flex', width: '320px', 'margin-bottom': '10px' }">
    <div class="rating-text left ">{{ minRatingText }}</div>
    <div class="rating-text right">{{ maxRatingText }}</div>
  </div>
</div>
