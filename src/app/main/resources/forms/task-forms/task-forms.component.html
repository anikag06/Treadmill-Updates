<div class="container-fluid px-0">
  <div class="row no-gutters">
    <div class="col-12 w-100 px-0 " id="main-heading">
      <div class="h-100 ml-4 my-auto d-inline-block ">
          <p class="py-1 h-100 my-auto"> My Tasks </p></div>
          
      <div class="h-100 d-inline-block float-right">
        <button class="h-100"
          mat-button [matMenuTriggerFor]="beforeMenu">
          <i class="material-icons"  >
            more_horiz
          </i>
        </button>
      </div>
      
      <mat-menu 
        #beforeMenu="matMenu" xPosition="before" yPosition="below" >
          <app-forms-sidebar
            (objectEmitter)="taskSelected($event)"
            (newForm)="onAddNewForm()">
          </app-forms-sidebar>
      </mat-menu>
    </div>
  </div>

  <div class="row no-gutters">
    <div class="col-12 col-lg-12">
      <app-tasks [task]="task" [reset]="reset"></app-tasks>
    </div>
  </div>
</div>
