<div class="step-group">
  <div class="row">
    <div class="col-2">
      <svg viewport="0 0 50 50" height="50" width="50" xmlns="http://www.w3.org/2000/svg">
        <circle cx="25" cy="25" r="20" stroke="#ccc" stroke-width="3" fill="transparent"/>
        <circle
          cx="25"
          cy="25"
          r="20"
          stroke="#666"
          stroke-width="3"
          fill="transparent"
          [attr.stroke-dashoffset]="dashOffset()"
          stroke-dasharray="126"
          stroke-linecap="round"
          transform="rotate(270 25 25)"/>
        <text stroke="#666" x="21" y="30">
          {{stepGroup.sequence + 1}}
        </text>
      </svg>
    </div>
    <div class="col-10 step-group-name">
      {{stepGroup.name}}
    </div>
  </div>
  <div class="row">
    <div class="col-2">
      <app-steps-indicator [stepGroup]="stepGroup"></app-steps-indicator>
    </div>
    <div class="col-10">
      <app-step *ngFor="let step of stepGroup.steps" [step]="step" [stepGroup]="stepGroup"></app-step>
    </div>
  </div>
</div>
