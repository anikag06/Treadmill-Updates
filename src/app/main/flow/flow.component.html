<div class="container-fluid flow-container">
    <div class="row">
        <div class="col">
          <h2 class="progress-heading">Progress</h2>
        </div>
    </div>
    <div class="row w-100 justify-content-center mx-0 px-0">
      <div class="col-12 flow-scroll">
        <div class="flow-scroll-inner ">
          <mat-accordion class="my-5">
            <app-step-group
              *ngFor="let stepGroup of stepGroups"
              [stepGroup]="stepGroup">
            </app-step-group>
          </mat-accordion>
        </div>
      </div>
    </div>
</div>
