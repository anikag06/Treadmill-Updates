<div class="score row ml-0 small-font">
  <div class="col-6 pl-0">
    <b>Points: {{score}}</b>
  </div>
  <div class="col-3">

  </div>
  <div class="col-3" #checkElement>
    <img style="width:15px;height:15px; "
      src="../../../../../../../assets/games/cognitive-distortion-game/clock icon.png">
    <div class="timeDisplay float-right">
      <b>{{timeLeft}}s</b>
    </div>

  </div>
</div>
<div class="row mb-2 ml-0">

  <div class="col-2 barsDiv  w-75 justify-content-start mt-1 pr-2 pl-0">
    <img src="../../../../../../../assets/games/cognitive-distortion-game/Gold badge symbol.svg">

    <span class="float-right">{{goldNumber}} </span>
    <mat-progress-bar class="goldBar" mode="determinate" [value]="goldValue"></mat-progress-bar>
  </div>


  <div class="col-2 barsDiv w-75 justify-content-start mt-1  pr-2 pl-0">
    <img src="../../../../../../../assets/games/cognitive-distortion-game/Silver badge symbol.svg">

    <span class="float-right"> {{silverNumber}}</span>
    <mat-progress-bar class="silverBar" mode="determinate" [value]="silverValue"></mat-progress-bar>
  </div>



  <div class="col-2 barsDiv w-75 justify-content-start mt-1 pr-2 pl-0">
    <img src="../../../../../../../assets/games/cognitive-distortion-game/Bronze badge symbol.svg">

    <span class="float-right">{{bronzeNumber}} </span>
    <mat-progress-bar class="bronzeBar" mode="determinate" [value]="bronzeValue"></mat-progress-bar>
  </div>

  <div class="col"></div>

  <div class="col-3 pl-0 mt-1">
    <div class="row smallest-font">
      <div class="col-6 float-left">
        <b>Easy</b>
      </div>
      <div class="col-6 pl-2 float-right">
        <b>Hard</b>
      </div>
    </div>
    <div class="row border border-dark rounded difficultyBar ml-0">
      <mat-progress-bar class="gameDifficultyBar" mode="determinate" [value]="difficultyValue">
      </mat-progress-bar>
    </div>

  </div>
