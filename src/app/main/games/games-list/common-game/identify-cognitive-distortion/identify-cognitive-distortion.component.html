<div class="game-container justify-content-center">


  <div class="main container-fluid justify-content-center">

    <div class="col text-center text-loading" *ngIf="showLoading"> Loading... </div>

    <div class="home-page" *ngIf="!playing" [ngStyle]="{display: showLoading ? 'none' : 'inline'}">

      <img style=" height:200px" src="../../../../../../../assets/games/cognitive-distortion-game/Thinking errors.svg"
           (load)="removeLoading()">
      <h2>{{gameName}}</h2>
    </div>
    <div>
      <app-idc-score *ngIf="playing"></app-idc-score>

    </div>
    <div id="blurrContainer">
      <app-idc-main *ngIf="playing" [blurred] = "blurred"></app-idc-main>

    </div>
    <div class="info mb-3 justify-content-end float-left" *ngIf="playing" #infoElement>
      <img style="width:36px;height:36px; "
        src="../../../../../../../assets/games/cognitive-distortion-game/Info Icon.png" (click)="openInfoPopup()">
    </div>
  </div>
</div>
