<div class="row w-100 px-0 pt-2 pb-3 mx-0 asg-instruction-div">
  <div class="col-12" *ngIf="!showSummary">
    <div class="row justify-content-center mb-2" >
      <h5> How to play? </h5>
    </div>
    <div class="row content justify-content-center mt-1">

      <div class="col asg-help-pic px-0 justify-content-center">
        <div class="text-center justify-content-center">
          <img class="asg-help-pic"
               src="../../../../../../../assets/games/Attribution-style-game/Balloon%20Burst.svg">
        </div>

      </div>
      <div class="col justify-content-center ">
        <ul>
          <li> <p class="instrn-text">Shoot as many balloons as possible within 30 seconds. </p></li>
          <li> <p class="instrn-text">Click/Tap to shoot the arrow.</p></li>
          <li> <p class="instrn-text">Click/Tap and drag to change the orientation of the bow.</p></li>
        </ul>
      </div>


    </div>
    <div class="row justify-content-center">
      <div class="col-6 col-lg-12 text-center mt-2">
      <button [color]="'asg-start'"
              mat-raised-button
              (click)='asgGameStart()'>
        Start
      </button>
      </div>
    <div class="col-6 col-lg-12 text-center mt-2 mt-lg-3" *ngIf="viewSummary">
      <button mat-raised-button [color]="'asg-summary'" (click)="onShowSummary()" type="button" #showSummaryBtn>View summary</button>
    </div>
  </div>


</div>
  <app-asg-summary *ngIf="showSummary" (close) = "closeDialog()"></app-asg-summary>
</div>
