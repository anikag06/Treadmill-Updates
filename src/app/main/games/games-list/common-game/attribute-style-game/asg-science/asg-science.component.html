<div class="px-3 py-3 main-div">
  <h5 class="text-center">Science behind the game</h5>
  <p>
    Research shows that depressed people often jump to a
    negative conclusion. Given an ambiguous situation, they think that the
    worst outcome is going to happen. This game has been designed to train
    your mind to link positive outcomes to ambiguous situations.

  </p>
  <div  class="text-center">
    <button mat-raised-button (click)= "onclose()" [color]="'btn-color'"> close </button>
  </div>

</div>
