<div class="row px-0 py-0 pb-2 instructions-div mx-0">
    <div class="col-12">
        <div class="sticky-top pt-2 play-heading w-100 text-center mt-0">
            <mat-card-title class="w-100 text-center">
                <b> How to play?  </b>
            </mat-card-title>
            <hr>
        </div>
        <mat-card-content>
            <p class="card-text">Find words in the grid to unlock the sentence.</p>
            <div class="div-instruction" style="position: relative; z-index: 1;" >
              <div class="div-instruction-img justify-content-center">
                <img class="card-img-top img-fluid rounded" src="../../../../../assets/games/interpretation_bias_game/images/gifs/1.png" alt="Swipe gif">
              <span class="instruction-img justify-content-center" style="position: absolute;left:0px; top: 0px; z-index: 3;">

                  <mat-icon [ngStyle]="{'font-size': '60px',
                                'vertical-align': 'middle',
                                'margin-top': '45%',
                                'margin-left': '35%',
                                'color':'white'}">
                        play_circle_outline
                    </mat-icon >
                </span>
              </div>
                <div class="div-instruction-gif d-none">
                    <img class="card-gif-top img-fluid rounded" src="../../../../../assets/games/interpretation_bias_game/images/gifs/1.gif" alt="Swipe gif">
                </div>
            </div>
        <br/>
            <p class="card-text">Find extra words to earn extra coins.</p>
            <div class="div-instruction" style="position: relative; z-index: 1;">
                <div class="div-instruction-img">
                  <img class="card-img-top img-fluid rounded" src="../../../../../assets/games/interpretation_bias_game/images/gifs/2.png" alt="Swipe gif">

                  <mat-icon [ngStyle]="{'font-size': '60px',

                                'color':'white'}">

                    </mat-icon >

                </div>
                <div class="div-instruction-gif d-none">
                    <img class="card-gif-top img-fluid rounded" src="../../../../../assets/games/interpretation_bias_game/images/gifs/2.gif" alt="Swipe gif">
                </div>
            </div>
          <br/>
            <p class="card-text">Read the sentence.</p>
            <div class="div-instruction" style="position: relative; z-index: 1;" >
                <div class="div-instruction-img">
                    <img class="card-img-top img-fluid rounded" src="../../../../../assets/games/interpretation_bias_game/images/gifs/3.png" alt="Swipe gif">
                  <span class="instruction-img justify-content-center" style="position: absolute;left:0px; top: 0px; z-index: 3;">

                                'margin-top': '45%',
                                'margin-left': '35%',

                        play_circle_outline
                    </mat-icon >
                  </span>
                </div>
                <div class="div-instruction-gif d-none">
                    <img class="card-gif-top img-fluid rounded" src="../../../../../assets/games/interpretation_bias_game/images/gifs/3.gif" alt="Swipe gif">
                </div>
            </div>

            <p class="card-text">Is the sentence related to the word? Answer as quickly as possible to earn more coins.</p>
            <div class="div-instruction" style="position: relative; z-index: 1;" >
                <div class="div-instruction-img">
                    <img class="card-img-top img-fluid rounded" src="../../../../../assets/games/interpretation_bias_game/images/gifs/4.png" alt="Swipe gif">
                  <span class="instruction-img justify-content-center" style="position: absolute;left:0px; top: 0px; z-index: 3;">
                    <mat-icon [ngStyle]="{'font-size': '60px',

                    </mat-icon >

                <div class="div-instruction-gif d-none">
                    <img class="card-gif-top img-fluid rounded" src="../../../../../assets/games/interpretation_bias_game/images/gifs/4.gif" alt="Swipe gif">
                </div>
            </div>
        </mat-card-content>
        <hr>
        <button mat-raised-button [color]="'ibg-start'"
            class='w-100'
            (click) = "onPlayClicked()">
