<div class="row justify-content-center align-items-center" 
  tabindex="0" id="game_div"  #gameDiv >
  <div class="common-div w-100"  >
    <!-- buttons shown when the game is paused -->
      <div 
        class="col d-flex justify-content-center align-items-center d-none"
        *ngIf = "showSideButtons" 
        id="common-pause-clicked-div">
          <div class="common-pause-clicked">
            <div class="col paused-game-btns">
              <img 
                id="common-home-btn"
                class="home-btn mx-auto img-btn"
                (click) = "onHomeClick()" 
                src="../../../../assets/games/home.png">
            </div>  
            <div class="col paused-game-btns">
              <img 
                id="common-help-btn"
                class="help-btn mx-auto img-btn" 
                (click) = "onHelpClick()"
                src="../../../../../assets/games/help.png">
            </div>
            <div class="col paused-game-btns">
              <img 
                id="common-resume-btn" 
                class="resume-btn mx-auto img-btn"
                (click) = "onResumeClick()" 
                src="../../../../../assets/games/play.png">
            </div>    
            <div class="col paused-game-btns">
              <img 
                id="common-replay-btn"
                class="replay-btn mx-auto img-btn" 
                (click) = "onRestartClick()"
                src="../../../../../assets/games/replay.png">
            </div>  
            <div class="col paused-game-btns">
              <img 
                id="common-sound-on-btn"
                class="sound mx-auto img-btn" 
                (click) = "onSoundClick()"
                *ngIf = "isSoundOn"
                src="../../../../../assets/games/sound.png">
            </div> 
            <div class="col paused-game-btns">
              <img 
                id="common-sound-off-btn"
                class="sound mx-auto img-btn" 
                (click) = "onSoundClick()"
                *ngIf = "!isSoundOn"
                src="../../../../../assets/games/mute.png">
            </div> 
          </div>
      </div>
 <!-- showing the game component  -->
      <div class="row justify-content-center align-items-center h-100">
        <app-executive-control-game 
          class="w-100 h-100"
          *ngIf="isExecutiveControl"></app-executive-control-game>
        <app-interpretation-bias-game
          class="w-100 h-100" 
          *ngIf="isInterpretationBias"></app-interpretation-bias-game>
        <app-learned-helplessness-game
          class="w-100 h-100" 
          *ngIf="isLearnedHelplessness"></app-learned-helplessness-game>
          <app-attribute-style-game
          class="w-100 h-100" 
          *ngIf="isAttributeGame"></app-attribute-style-game>
        <app-friendly-face-game
          class="w-100 h-100"
          *ngIf="isFriendlyFace"></app-friendly-face-game>
        <app-mental-imagery
          class="w-100 h-100"
          *ngIf="isMentalImagery"></app-mental-imagery>
      </div>
<!-- buttons on first page -->
      
      <div class="row align-items-center mx-2 firstpage-btns" 
            id="firstpage-btns" #firstpage_btns>
        <div class="col-auto mr-auto px-0">
          <img 
            id="common-science-btn" 
            class="common-science-btn img-btn"
            src="../../../../../assets/games/science_behind_game.png">
        </div>
        
        <div class="col-auto ml-auto px-0">
          <img 
            id="common-sound-on-fp" 
            class="common-sound-btn img-btn" 
            (click) = "onSoundClick()"
            *ngIf = "isSoundOn"
            src="../../../../../assets/games/sound.png">
          <img 
            id="common-sound-off-fp" 
            class="common-sound-btn img-btn float-right"
            (click) = "onSoundClick()" 
            *ngIf = "!isSoundOn"
            src="../../../../../assets/games/mute.png">
        </div>
        
        <!-- <img 
          id="common-exit-btn"
          class="common-exit mx-1 img-btn" 
          (click) = "onExitClick()"
          src="../../../../../assets/games/back.png"> -->
      </div>
      <div class="row justify-content-center align-items-center play-game-btn"
        #start_game_btns>
        <div class="col-auto mx-auto justify-content-center">
          <img 
            id="common-start-btn"
            class="common-play-game mx-auto" 
            (click) = "onPlayClick()"
            *ngIf = "showSecondPlayBtn"
            src="../../../../../assets/games/play.png">
        </div>
        <div class="col-12 text-center">
          <div class="small-font"> Tap to start </div>
        </div>
      </div>

<!-- pause, hint and sound button on bottom of every page -->
      <div class="row justify-content-end align-items-center mx-2 d-none" 
          id="pause-common-div" #pause_common_div>
        <img 
          id = "common-pause"
          class="mx-2 img-btn"
          (click) = "onPauseClick()"
          src="../../../../../assets/games/pause.png">
        <img
          id = "common-sound-on"
          class="mx-2 img-btn common-sound float-right"
          (click) = "onSoundClick()"
          *ngIf = "isSoundOn"
          src="../../../../../assets/games/sound.png">
        <img
          id = "common-sound-off"
          class="mx-2 img-btn common-sound float-right"
          (click) = "onSoundClick()"
          *ngIf = "!isSoundOn"
          src="../../../../../assets/games/mute.png">
        <!-- <div class="hint-btn-div">
         
        </div> -->
      </div>
    </div>
</div>


<div class="game-play d-none">
</div>
