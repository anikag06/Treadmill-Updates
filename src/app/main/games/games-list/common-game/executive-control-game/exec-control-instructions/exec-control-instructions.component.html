<div class="row px-0 py-0 pb-2 mx-0 ec-instruction-div">
    <div class="col-12">
        <div class="row justify-content-center">
            How to play?
        </div>
        <div class="row justify-content-center">
            <div class="col justify-content-center">
                <div class="col-auto justify-content-center">
                    <img class="ec-help-pic"
                        src="../../../../../../../assets/games/executive-control-game/jpg_phaser/blue_filler.jpg">
                </div>

            </div>
            <div class="col justify-content-center">
                Collect coins and avoid obstacles. That's all, all the best!
            </div>
        </div>
        <div class="row justify-content-center my-3">
            <button [color]="'ecg-start'"
                mat-raised-button
                (click)='ecGameStart()'>
                start
            </button>
        </div>
    </div>


</div>
