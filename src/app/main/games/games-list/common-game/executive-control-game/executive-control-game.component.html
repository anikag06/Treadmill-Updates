<div class="exec-game-page row h-100 w-100 mx-0 px-0">
  <div class="game-container w-100 align-items-center">
    <div class="col text-center text-loading" *ngIf="showLoading"> Loading... </div>

    <img src="../../../../../../assets/games/executive-control-game/png/background_images/mountains.png"
         (load)="removeLoading()" [ngStyle]="{display: 'none'}"/>
    <div id="start_page" class="col-auto mx-0 px-0 w-100 align-items-center align-self-center" *ngIf="!showLoading">
      <p id="game_name" class="">{{gameName}}</p>
    </div>
    <div class="d-none" id="execGame">
      <div id="canvas-div" class="row align-items-center game-components flex-grow-1" #newElement>
        <div class="col align-items-center ">
          <div class="d-flex justify-content-center">
            <canvas id="canvas1"></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="message-for-mobile" class="row mx-auto text-white rounded small-font">
    <div class="mt-auto">
      Play in landscape mode for better experience.
    </div>
  </div>
</div>
<div class="scroll-div" #scroll>

</div>
