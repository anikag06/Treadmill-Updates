<div class="q">
    <div class="container">
        <div class="row">
            
                    <div class="col-xl-4 col-md-6 col-sm-12" class="card text-center" *ngFor="let item of group; let i = index">
                            <div class="card-header">
                                    {{item.title}}  
                                </div>
                            <div class="card-body">
                                {{item.description}}
                                    
                            </div>
                            <button  (click)="reset(i)">reset</button>
                            <button  (click)="current_history(i)"><a routerLink="/conversations">continue</a></button>
                            <button  (click)="speed_run(i)"><a routerLink="/conversations">show</a></button>
                        </div>           
        </div>
    </div>
</div>
