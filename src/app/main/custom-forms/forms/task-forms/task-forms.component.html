<div class="container-fluid no-padding">
  <div class="row no-gutters">
    <div class="col-12">
      <h1 class="main-heading-h1">My Tasks</h1>
    </div>
  </div>
  <div class="row no-gutters">
    <div class="col-12 col-lg-3 order-lg-last mb-3">
      <div class="card card-240">
        <app-forms-sidebar
          (objectEmitter)="taskSelected($event)"
          (newForm)="onAddNewForm()">
        </app-forms-sidebar>
      </div>
    </div>
    <div class="col-12 col-lg-9">
      <app-tasks [task]="task" [reset]="reset"></app-tasks>
    </div>
  </div>
</div>
