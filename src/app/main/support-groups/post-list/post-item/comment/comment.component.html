<div class="row no-gutters comment">
  <div class="col-3 text-center">
    <img [src]="comment.user.avatar" alt="User avatar" width="50" height="60">
    <p class="text-muted user">{{comment.user.username}}</p>
  </div>
  <div class="col-9" *ngIf="!editMode else showEdit">
    <div class='body' [innerHTML]="comment.body | safeHtml"></div>
    <p><span class="text-muted date">{{ comment.created_at |  date: 'medium' | timeAgo }}</span></p>
    <div class="row">
      <div class="col-12">
        <button class="btn btn-sm" (click)="onThumbsUp()"><img [src]="thumbsUp" width="18" height="18">{{comment.up_votes}}</button>
        <button class="btn btn-sm" (click)="onThumbsDown()"><img [src]="thumbsDown" width="18" height="18"></button>
        <button class="btn btn-sm" (click)="toggleReply = !toggleReply">Reply</button>
        <span *ngIf="this.comment.user.username == this.user.username">
          <button class="btn btn-sm" (click)="onEdit()">Edit</button>
          <button class="btn btn-sm" (click)="onDelete()">Delete</button>
        </span>
      </div>
    </div>
    <div class="replyForm" *ngIf="toggleReply">
      <form class="form-inline mb-2" (ngSubmit)="submitReply()" #replyForm="ngForm">
        <div class="form-group">
            <label for="body">Reply</label>
            <input type="text" name="body" class="form-control" ngModel>
        </div>
        <button type="submit" class="btn btn-success">Reply</button>
      </form>
    </div>
    <div class="show-nested-comments" *ngIf="comment.nested_comment_count > 0">
      <ng-container *ngIf="!hide">
          <app-nested-comment
            *ngFor="let ncomment of nestedComments"
            (deleteEmitter)="onNestedCommentDelete($event)"
            [userNestedComment]="ncomment">
        </app-nested-comment>
      </ng-container>
      <button class="btn btn-sm btn-underline" (click)="showNestedComment()" *ngIf="moreComments || hide">View comments ({{comment.nested_comment_count}})</button>
      <button class="btn btn-sm btn-underline" (click)="showLessNestedComment()" *ngIf="!hide && comment.nested_comment_count > 0 && nestedComments.length > 0">Hide comments</button>
    </div>
  </div>
</div>
<ng-template #showEdit>
  <div class="col-11">
    <div class="errors" *ngIf="errors.length > 0">
      <ul>
        <li *ngFor="let error of errors"><strong>{{error.name}}</strong>: {{error.value}}</li>
      </ul>
    </div>
    <form (ngSubmit)="onSubmit()" #editForm="ngForm">
      <fieldset [disabled]="disabledValue">
        <angular-editor name="name" [(ngModel)]="editorBody" required [config]="editorConfig"></angular-editor>
        <button type="submit" class="btn btn-primary btn-sm" [disabled]="this.sanitzer.stripTags(this.editorBody).length === 0">Comment</button>
        &nbsp;
        <button type="button" class="btn btn-danger btn-sm" (click)="onCancel()">Cancel</button>
      </fieldset>
    </form>
  </div>
</ng-template>
