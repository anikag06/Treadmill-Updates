<div class="error-div" *ngIf="errors.length > 0">
  <h3>Some error occured</h3>
  <ul>
    <li *ngFor="let error of errors">
      <strong>{{error.name}}</strong>: {{ error.value }}
    </li>
  </ul>
</div>

<div class="container-fluid">
  <form (ngSubmit)="formSubmit()" [formGroup]="postForm" class="row">
    <div class="col-lg-6 create-post">
      <div class="form-group">
        <label for="body">Write your post</label>
        <angular-editor formControlName="body" [config]="editorConfig" required></angular-editor>
      </div>
      <div class="form-group">
        <label for="title">Give your post a title</label>
        <input type="text" class="form-control" formControlName="title" id="title">
      </div>
      <input type="hidden" name="id" formControlName="id">
    </div>
    <div class="col-lg-6">
      <label for="tags">Select tags</label>
      <div class="form-group row">
        <!-- <label for="tags-heading" class="sub-heading">Health</label> -->
        <div class="col-4" *ngFor="let tag of getFormTags(); let i = index">
          <label formArrayName="tags">
            <input type="checkbox" [formControlName]="i" (change)="onCheckboxChange(tags[i].id, $event)">
            {{tags[i].name}}
          </label>
        </div>
      </div>
    </div>
    <div class="col-lg-6 create-post">
      <div class="btn-area text-md-center text-lg-right">
        <button type="button" mat-raised-button class="close-btn" (click)="onClose()">Close</button>

        &nbsp;
        <button type="submit" mat-raised-button class="submit-btn">Submit</button>

      </div>
    </div>
  </form>
</div>
