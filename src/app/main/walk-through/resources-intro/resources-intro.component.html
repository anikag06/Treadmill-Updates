<div class="intro-img-div">
  <img
   class="therapist-img"
    src="assets/flow/therapist.svg"
    alt="intro_bot"
  />
</div>

<mat-dialog-content>
  <div class="mt-5 mb-2" [ngStyle]="{textAlign:'center' }">
    {{ description }}
  </div>
</mat-dialog-content>

<mat-dialog-actions class="float-right">
  <button
    mat-raised-button
    class="btn start-btn float-right"
    (click)="startIntro()"
    matDialogClose
    [innerHTML]="btnTxt"
  ></button>
</mat-dialog-actions>
