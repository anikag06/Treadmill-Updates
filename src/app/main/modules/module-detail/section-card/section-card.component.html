<div
  class="section-card"
  [ngClass]="{
    'active': section.is_active ,
    'done': !section.is_active && !section.is_content_locked,
    'locked': section.is_content_locked
  }">
  <p>{{section.name}}</p>
  <img
        src="assets/modules/lock.svg"
        alt="lock"
        height="50"
        width="50"
        class="lock"
        *ngIf="section.is_content_locked">
</div>
