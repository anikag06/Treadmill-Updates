<app-procon-item
  *ngFor="let procon of prosCons"
  [procon]="procon"
  (proconDelete)=onProconDelete($event)>
</app-procon-item>
<div>
  <span class="pull-right" (click)="showForm=!showForm">
    <mat-icon *ngIf="!showForm">add_circle</mat-icon>
    <mat-icon *ngIf="showForm">clear_circle</mat-icon>
  </span>
</div>
<div *ngIf="showForm">
  <form (ngSubmit)="onSubmit()" #proconForm="ngForm">
    <mat-form-field class="full-width">
      <textarea name="procon" id="procon" rows="1" placeholder="Enter  {{pro ? 'pro' : 'con'}}"
        matInput required [autofocus] ngModel (focusout)="onTextAreaFocusOut()"></textarea>
    </mat-form-field>
  </form>
</div>
