<mat-drawer-container class="sidenav-container">
  <mat-drawer #drawer class="sidenav"
      [attr.role]="(isHandset$ | async) ? 'dialog' : 'navigation'"
      [mode]="(isHandset$ | async) ? 'over' : 'side'"
      [opened]="((isHandset$ | async) === false)">
    <mat-toolbar>
      <div>
        <a href="/dashboard"><img src="https://www.treadwill.org/static/cbt2/images/logo/treadwill_logo.png"  style="margin-top: 10px; width: 75%;" class="center" alt="treadwill_logo">
        </a>
      </div>
    </mat-toolbar>

    <mat-nav-list  role="navigation">
      <div class="list-wrapper">

       <div class="list-user">
        <mat-icon style="
          transform: scale(3)">face
        </mat-icon>
       </div>
       <br>
       <div class="list-user-name">
          <strong>Nanzu</strong>
       </div>

          
       <div class="list-wrapper-items">
        <a mat-list-item routerLink="/modules">
          <span class="list-wrapper-items-icon">
            <img src="assets/modules/modules.svg">
          </span>
          <span class="list-wrapper-items-name">
            Modules
          </span>
        </a> 
       </div>

       <div class="list-wrapper-items">
        <a mat-list-item routerLink="/games">
          <span class="list-wrapper-items-icon">
            <img src="assets/modules/games.svg">
          </span>
          <span class="list-wrapper-items-name">
            Games
          </span>
        </a>
       </div>

       <div class="list-wrapper-items">
        <a mat-list-item href="#">
          <span class="list-wrapper-items-icon">
            <img src="assets/modules/groups.svg">
          </span>
          <span class="list-wrapper-items-name">
            Groups
          </span>
        </a>
       </div>

       <div class="list-wrapper-items">
        <a mat-list-item href="#">
          <span class="list-wrapper-items-icon">
            <img src="assets/modules/scores.svg">
          </span>
          <span class="list-wrapper-items-name">
             Scores
          </span>
        </a>
       </div>

       <div class="list-wrapper-items">
        <a mat-list-item href="#">
          <span class="list-wrapper-items-icon">
            <img src="assets/modules/resources.svg">
          </span>
          <span class="list-wrapper-items-name">
            Resources
          </span>
        </a>
       </div>

       <div class="list-wrapper-items">
        <a mat-list-item href="#">
          <span class="list-wrapper-items-icon">
            <img src="assets/modules/settings.svg">
          </span>
          <span class="list-wrapper-items-name">
            Settings
          </span>
        </a>
       </div>

       <div class="list-wrapper-items">
        <a mat-list-item href="#">
          <span class="list-wrapper-items-icon">
          </span>
          <span class="list-wrapper-items-name"></span></a>
        </div>
          <!--Remove clickable link from the empty box above-->

       <div class="list-wrapper-items">
        <a mat-list-item href="#">
          <span class="list-wrapper-items-icon">
            <img style="margin-left: 4px;" src="assets/modules/need to talk.svg">
          </span>
          <span class="list-wrapper-items-name">
            Need to <br>talk?
          </span>
        </a>
       </div>

       <div class="list-wrapper-items">
        <a mat-list-item href="#">
          <span class="list-wrapper-items-icon">
            <img style="margin-left: 2px;" src="assets/modules/logout.svg">
          </span>
          <span class="list-wrapper-items-name">
            Logout
          </span>
        </a>
       </div>
    
      </div>
    </mat-nav-list>

  </mat-drawer>


  <mat-drawer-content>
    <mat-toolbar *ngIf="isHandset$ | async">
      <button
        type="button"
        aria-label="Toggle sidenav"
        mat-icon-button
        (click)="drawer.toggle()"
        *ngIf="isHandset$ | async">
        <mat-icon aria-label="Side nav toggle icon">menu</mat-icon>
      </button>
      <span></span>
    </mat-toolbar>
    <router-outlet></router-outlet>
  </mat-drawer-content>
</mat-drawer-container>
