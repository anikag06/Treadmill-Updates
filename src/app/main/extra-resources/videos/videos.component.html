
<div *ngIf = "videoType === 'mindfulnessVideo'">
<mat-card class="card">
        <div class = "preview-img-div">
        <img class = "preview-img" [src]="mindfulnessVideoItem.preview_img" >
        <img class = "youtube-button" src = "assets/icons/youtube.png">
        </div>
        <mat-card-footer class = "show-footer-style for-ellipsis "[innerHTML]="mindfulnessVideoItem.title "> </mat-card-footer>
 </mat-card>
</div>

<div *ngIf = "videoType === 'video'" >
  <mat-card class="card">
            <div class = "preview-img-div">
            <img class = "preview-img" [src]="videoItem.preview_img" >
            <img class = "youtube-button" src = "assets/icons/youtube.png">
            </div>
            <mat-card-footer class = "show-footer-style for-ellipsis "[innerHTML]="videoItem.title "> </mat-card-footer>
  </mat-card>
</div>
