<div class="chat-window" [@openClose]="chatWindowClosed ? 'closed' : 'open'">
  <div class="chat-header">
    <img class="chatbot-screen-img" src="assets/chatbot/on_chat_screen.png" alt="">
    <h3>WillBot</h3>
    <button mat-flat-button class="close-icon"  (click)="close()"><mat-icon>close</mat-icon></button>
  </div>
  <div class="chat-frame" #messagesDiv [scrollTop]="scrollTop">
    <div class="clearfix" *ngFor="let m of messages">
      <div>
        <ng-container *ngIf="!m.waiting else waiting">
            <div class="message" [ngClass]="{'bot': !m.user}" *ngIf="m.message">
              <div class="message-text" [innerHTML]="m.message"></div>
              <span class="date-time">{{m.datetime | date: 'short' }}</span>
            </div>
        </ng-container>
        <ng-template #waiting>
            <div class="message bot">
              <div class="message-text waiting">
                <div class="dot-typing"></div>
              </div>
            </div>
        </ng-template>
      </div>
      <div class="buttons">
        <button
          mat-raised-button
          color="primary"
          *ngFor="let button of m.buttons"
          (click)="chatButtonPressed(button, m)">
          <span class="btn-text">
            {{ button.payload }}
          </span>
        </button>
      </div>
    </div>
    <button class="mood-btn" type="input">Select your mood</button>
  </div>
  <div class="form-div">
    <form (ngSubmit)="onChatSubmit()" >
      <div class="textarea">
        <textarea
          class="form-control"
          placeholder="Enter your message"
          [(ngModel)]="message"
          name="message"
          [autofocus]
          rows="1"
          (keyup.enter)="onKey($event)"
          (focusin)="scrollToBottom()"
          #ti
          autocomplete="off">
        </textarea>
      </div>
      <div class="btn-div">
        <button
          type="submit"
        >
        <mat-icon [ngStyle]="{'color':'grey'}">send</mat-icon>
      </button>
      </div>
    </form>
  </div>
  
</div>
