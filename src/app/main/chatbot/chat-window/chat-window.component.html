<div
  class="container chat-window"
  [@openClose]="chatWindowClosed ? 'closed' : openingStyle() ">
  <div class="chat-header">
    <img
      class="chatbot-screen-img"
      src="assets/chatbot/on_chat_screen.png"
      alt=""
    />
    <h3>WillBot</h3>
    <button mat-flat-button class="close-icon" (click)="close()">
      <mat-icon>close</mat-icon>
    </button>
  </div>
  <div
    class="chat-frame"
    #messagesDiv
    [scrollTop]="scrollTop"
    appInfiniteScroll
    (scroll)="scrollFrame($event)"
  >
    <div class="clearfix messages" *ngFor="let m of messages">
      <div>
        <ng-container *ngIf="!m.waiting; else waiting">
          <div class="message" [ngClass]="{ bot: !m.user }" *ngIf="m.message">
            <div class="message-text" [innerHTML]="m.message"></div>
            <!-- <span class="date-time">{{m.datetime | date: 'short' }}</span> -->
          </div>
        </ng-container>
        <ng-template #waiting>
          <div class="message bot">
            <div class="message-text waiting">
              <div class="dot-typing"></div>
            </div>
          </div>
        </ng-template>
      </div>
      <div
        *ngFor="let image of m.images; let i = index"
        [ngStyle]="{ width: 'fit-content' }"
      >
        <img
          appLazyLoad
          loading="lazy"
          class="msg-img"
          src="{{ image.url }}"
          (click)="changeUrl(image, i)"
          (load)="hideSpinner(i)"
          alt="image"
        />

        <div class="credits" *ngIf="image.credits">
          <div class="creditDiv">
            <a class="link" [href]="image.link" target="_blank">{{
              image.name
            }}</a>
            <span> / </span>
            <a class="link" href="https://unsplash.com" target="_blank"
              >Unsplash</a
            >
          </div>
        </div>
        <div class="credits" *ngIf="image.creditsGIF">
          <div
            class="gifDiv"
            *ngIf="image.url === image.static_url"
            (click)="changeUrl(image, i)"
          >
            GIF
          </div>
          <div class="spinnerDiv" *ngIf="image.showSpinner">
            <mat-progress-spinner
              mode="indeterminate"
              diameter="20"
              color="accent"
            ></mat-progress-spinner>
          </div>
          <div class="creditDiv">
            <span> Powered By </span>
            <a class="link" href="https://giphy.com" target="_blank">GIPHY</a>
          </div>
        </div>
      </div>

      <div *ngFor="let widget of m.widgets">
        <div class="buttons">
          <button
            (click)="onMoodSelect()"
            *ngIf="widget === moodWidget && showMoodWidget"
          >
            <span class="btn-text">Select your mood</span>
          </button>
          <div *ngIf="showMoodTracker">
            <app-mood-tracker
              class="chatbot"
              (onClose)="onMoodSelect()"
              (moodSubmit)="onChatSubmit($event)"
              (moodMessage)="getMoodMessage($event)"
            ></app-mood-tracker>
          </div>
          <button
            (click)="onDateTimeSelect()"
            *ngIf="widget === dateTimeWidget"
          >
            Date Time
          </button>
          <div *ngIf="showDateTime">
            <app-date-time-picker
              class="chatbot"
              (onClose)="onDateTimeSelect()"
              (dateTimeSubmit)="onChatSubmit($event)"
              (dateTimeMessage)="getDateTimeMessage($event)"
            ></app-date-time-picker>
          </div>
        </div>
      </div>
    </div>
    <div
      class="buttons"
      [ngStyle]="{
        display: buttonType === clickAble ? 'table-cell' : 'block'
      }"
    >
      <button
        *ngFor="let button of showButtons"
        [ngClass]="{
          'btn radio_button': button.type === radio,
          'btn module_button': button.type === clickAble
        }"
        (click)="chatButtonPressed(button)"
      >
        <img
          src="assets/chatbot/tracker.png"
          [alt]="button.payload"
          width="136px"
          height="72px"
          *ngIf="button.type === clickAble; else btnText"
        />
        <ng-template #btnText>
          <span class="btn-text" [innerHTML]="button.payload"></span
        ></ng-template>
      </button>
      <div>
        <button
          id="more_button"
          *ngIf="showMore"
          class="btn btn-link"
          (click)="getButtons()"
        >
          + more...
        </button>
      </div>
    </div>
    <div class="clearfix no-internet" *ngIf="!isOnline">
      <!--        {{ isOnline }}-->
      <img
        src="assets/chatbot/Internet_disconnected.png"
        width="135px"
        [ngStyle]="{ marginLeft: '10%' }"
      />
      <div
        [ngStyle]="{
          marginTop: '30px',
          marginBottom: '20px'
        }"
      >
        Internet disconnected
      </div>
    </div>
  </div>
  <div class="form-div">
    <form (ngSubmit)="onChatSubmit()">
      <div class="textarea">
        <textarea
          matInput
          cdkTextareaAutosize
          cdkAutosizeMinRows="1"
          cdkAutosizeMaxRows="4"
          placeholder="Enter your message"
          [(ngModel)]="message"
          name="message"
          (keyup.enter)="onKey($event)"
          (focusin)="scrollToBottom()"
          #ti
          autocomplete="off"
        >
        </textarea>
      </div>
      <div class="btn-div">
        <button type="submit">
          <mat-icon [ngStyle]="{ color: 'grey' }">send</mat-icon>
        </button>
      </div>
    </form>
  </div>
</div>
