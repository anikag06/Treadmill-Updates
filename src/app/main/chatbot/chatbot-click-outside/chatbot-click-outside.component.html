<div *ngIf="showMessage" class="dialog px-3 py-3" [ngStyle]="{left :  this.xPosition+'px',top : this.yPosition+'px'}" (click)="closeMessage()">
  If you are trying to close WillBot, please click minimize button in WillBot.
  <div class="mx-2 mt-4 mb-2 float-right cursor-hand">
    <b>Okay</b>
  </div>
</div>
