<div class="chat" *ngIf="!removeChat">
  <app-chat-window [chatWindowClosed]="chatwindowClosed" (chatWindowClosedEmitter)="updateChatWindow($event)" ></app-chat-window>
  <input type="image" *ngIf="chatwindowClosed" class="chat-btn" src="assets/chatbot/chatbot_home_screen.png" alt="icon" (click)="toggleChat()">
</div>
