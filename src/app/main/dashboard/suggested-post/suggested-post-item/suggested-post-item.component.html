<div class="d-flex flex-row post-item no-gutters" #container>

  <div class=" d-inline-flex flex-column align-items-start">

    <img [src]="suggestedPost.avatar" alt="User avatar" width="42" height="42" class='post-user-avatar' (load)="removeLoading()" [ngStyle]="{display: showLoading ? 'none' : 'block'}">
    <div class="post-user-avatar avatar-skeleton " alt="You" [ngStyle]="{display: !showLoading ? 'none' : 'block'}" ></div>

    <!-- <div class=" d-flex flex-column align-items-start">
        <div class="user-stats d-flex flex-row align-items-start">
          <div class='user-avatar-username mb-0'>{{suggestedPost.username}}</div>
        </div>
      </div>
    </div> -->

  </div>
  <div class=" d-inline-flex flex-column align-items-start" style="cursor:pointer;"
    (click)="onPostClick(suggestedPost.id)">

    <div class="main-header w-100">
      <h2 [style.max-width]="container.offsetWidth - 100 + 'px'" *ngIf="!showLoading">{{suggestedPost.title }}</h2>
      <h2 [style.width]="container.offsetWidth - 100 + 'px'" class="text-skeleton" *ngIf="showLoading"></h2>
    </div>
    <div [style.width]="container.offsetWidth - 100 + 'px'" class="text-skeleton" *ngIf="showLoading"></div>

    <div class="post-body giveMeEllipsis" *ngIf="!showLoading">
      {{suggestedPost.body }}
    </div>
  </div>

  <!-- <div class="row no-gutters mt-2">
    <div class='col-12'>
      <div class="main-content">
        <div #htmlDiv [innerHTML]="body | safeHtml" [ngStyle]="{'word-break': 'break-word'}"></div>
        <span *ngIf="plainBodyLength() > minBodyLength && !newPost" class="text-right">
          <a (click)="toggleShow()" *ngIf="!showFullContent" class="toggler">show more</a>
        </span>
      </div>
    </div>
  </div> -->
</div>
