<div class="container-fluid">
    <div class="row">
        <div class="col-md-2">
            <app-side-nav></app-side-nav>
        </div>
        <div class="col-md-10 body-bg dashboard">
            <div class="row">
                <div class="col-md-4 col-sm-12">
                    <div class="chatbot d-flex justify-content-center grid-item"
                        *ngIf="user"
                        (click)="onChatbotClick()">
                        <div class="chatbot-inner">
                            <div class="chatbot-avatar">
                                <img src="assets/modules/nanzu.png" alt="chatbot-avatar">
                            </div>
                            <mat-card class="card">
                                Hi {{user.username}}! Do you have any questions?
                                Click on me and we can chat.
                            </mat-card>
                        </div>
                    </div>
                    <div class="chatbot d-flex justify-content-center grid-item" *ngIf="user">
                        <app-progress></app-progress>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
