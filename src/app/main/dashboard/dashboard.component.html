<ng-template  [ngIf]="!showQuestionnaire">
<div class="container-fluid body-bg">
  <div class="row">
    <div
      [ngClass]="{
        'd-block': showFlow,
        'd-none': !showFlow
      }"
      class="col-md-6 px-0"
    >
      <app-flow [navBar]="false"></app-flow>
    </div>
    <!-- <div class="col-md-6">
            <app-progress></app-progress>
        </div> -->

    <div
      [ngClass]="{
        'd-block': !hideCards,
        'd-none': hideCards
      }"
      class="col-md-6 px-0"
      *ngIf="user.is_exp"
    >
      <!-- <div class="row"> -->
      <app-user-profile
        class="dashboard-profile-card"
        [userProfile]="userProfile"
      ></app-user-profile>
      <!-- </div> -->

      <div class="row sugg-post-things-todo-row mr-2">
        <div class="col-xl-6 suggPostDiv ml-4 ml-xl-0 no-gutters">
          <app-suggested-post></app-suggested-post>
        </div>
        <div class="col-xl-5 todoDiv mt-3 ml-4 ml-xl-0 mt-xl-0 no-gutters">
          <app-things-todo></app-things-todo>
        </div>
      </div>
    </div>
  </div>
</div>
</ng-template>
<ng-template  [ngIf]="showQuestionnaire">
  <div class="row" >
    <app-questionnaire class="w-100" [fromFlow]="true" [stepId]="null" [fromTrialRegistration]="false"></app-questionnaire>
  </div>
</ng-template>
