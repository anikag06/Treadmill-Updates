<ng-template  [ngIf]="!showQuestionnaire">
<div class="container-fluid body-bg px-0">
  <div class="d-flex flex-column flex-md-row justify-content-center justify-content-md-between">
    <div
      [ngClass]="{
        'd-block': showFlow,
        'd-none': !showFlow
      }"
    >
      <app-flow [navBar]="false"></app-flow>
    </div>
    <!-- <div class="col-md-6">
            <app-progress></app-progress>
        </div> -->

    <div
      [ngClass]="{
        'd-block': !hideCards,
        'd-none': hideCards
      }"
      class=""
      *ngIf="user.is_exp"
    >
       <div class="d-flex justify-content-center justify-content-md-start justify-content-lg-end flex-wrap">
      <app-user-profile
        class="dashboard-profile-card"
        [userProfile]="userProfile"
        [fromSupportGroup]="false"
      ></app-user-profile>
       </div>

      <div class="d-flex align-items-md-start align-items-lg-end align-items-xl-start  justify-content-xl-between flex-column flex-xl-row sugg-post-things-todo-row justify-content-xl-between flex-column flex-xl-row sugg-post-things-todo-row">
        <div class="d-block justify-content-end suggPostDiv ml-xl-0 no-gutters">
          <app-suggested-post></app-suggested-post>
        </div>
        <div class="d-block justify-content-end todoDiv mt-3 ml-xl-0 mt-xl-0 no-gutters">
          <app-things-todo></app-things-todo>
        </div>
      </div>
    </div>
  </div>
<!--  </div>-->
</div>
</ng-template>
<ng-template  [ngIf]="showQuestionnaire">
  <div class="row" >
    <app-questionnaire-deprecated class="w-100" [fromFlow]="true" [stepId]="null" [fromTrialRegistration]="false"></app-questionnaire-deprecated>
  </div>
</ng-template>
