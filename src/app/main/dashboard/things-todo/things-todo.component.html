<div class="things-todo">

  <div class="col-12 things-todo-main">
    <h3>Things to do</h3>
    <ul class="main-list">
      <li *ngFor="let todo of todos">
        <mat-checkbox [checked]="todo.done" (change)="onTodoChange(todo, $event)">
          {{ todo.name }}
        </mat-checkbox>
      </li>
    </ul>
  </div>
</div>
