<div class="chatbot-avatar">
  <div class="row">
    <div class="col-5 col-md-12">
      <img src="assets/modules/chatbot.svg" class="chatbot-image" alt="chatbot">
    </div>
    <div class="col-7 col-md-12" *ngIf="user else loading">
      <div class="chatbot-text">
        Hello {{user.username}} Do you have any Questions?
        Click on me and we can chat.
      </div>
    </div>
  </div>
  <ng-template #loading>
    <div class="col-sm-9 col-lg-12">
      Loading...
    </div>
  </ng-template>  
</div>
