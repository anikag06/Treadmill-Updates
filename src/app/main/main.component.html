<mat-drawer-container
  class="sidenav-container"
  autosize
  [ngClass]="{
    'fix-parent': fixParent
  }"
>
  <mat-drawer
    id="drawer"
    #drawer
    class="sidenav"
    [attr.role]="(isHandset$ | async) ? 'dialog' : 'navigation'"
    [mode]="(isHandset$ | async) ? 'over' : 'side'"
    [opened]="(isHandset$ | async) === false"
    #tooltip="matTooltip"
    matTooltipDisabled
    matTooltip="{{ tooltipData }}"
    [matTooltipPosition]="'right'"
    (click)="tooltipShow()"
    [ngStyle]="{ 'z-index': overlayOpen ? '1' : '999999' }"
  >
    <mat-toolbar [appDisableClick]="{ apply: isDisabled }">
      <div>
        <a class="main-logo" routerLink="/main/dashboard">
          <img
            src="assets/shared/logo_full.svg"
            style="margin-top: 10px; width: 75%;"
            class="center"
            alt="treadwill_logo"
          />
        </a>
      </div>
      <div>
        <a routerLink="/main/dashboard"><img *ngIf="!isExpanded" src="assets/modules/icon-tw-small.png" class="icons-width" />
        </a>
      </div>
    </mat-toolbar>

    <mat-nav-list
      role="navigation"
      (click)="onLinkClick($event)"
      [appDisableClick]="{ apply: isDisabled }"
    >
      <div class="list-wrapper">
        <div class="list-user">
          <img
            [src]="user.avatar"
            [alt]="user.username"
            width="80"
            height="80"
          />
        </div>
        <br />
        <div class="list-user-name">
          <strong>{{ user.username }}</strong>
        </div>

        <div class="list-wrapper-items">
          <a mat-list-item routerLink="/main/dashboard" routerLinkActive="activeClass" >
            <span class="list-wrapper-items-icon">
              <img
                class="icons-width"
                src="assets/modules/Home.svg"
                alt="home-icon"
              />
            </span>
            <span class="list-wrapper-items-name">
              Home
            </span>
          </a>
        </div>

        <div *ngIf="user.is_exp" class="list-wrapper-items" id="games">
          <a
            mat-list-item
            [ngStyle]="{ backgroundColor: introAnimation ? '#F4BB56' : '' }"
            routerLink="/main/games"
            routerLinkActive="activeClass"
          >
            <span class="list-wrapper-items-icon">
              <img class="icons-width" src="assets/shared/Game.svg" />
            </span>
            <span class="list-wrapper-items-name">
              Games
            </span>
          </a>
        </div>

        <div
          *ngIf="user.is_exp"
          class="list-wrapper-items"
          id="support-group"
          (click)="showSupportGroupIntro()"
        >
          <a
            mat-list-item
            [ngStyle]="{ backgroundColor: introAnimation ? '#F4BB56' : ''  }"
            routerLink="/main/support-groups"
            routerLinkActive="activeClass"
          >
            <span class="list-wrapper-items-icon">
              <img
                class="icons-width"
                src="assets/shared/Support Group.svg"
              />
            </span>
            <span class="list-wrapper-items-name">
              SupportGroup
            </span>
          </a>
        </div>

        <div class="list-wrapper-items" id="forms">
          <a
            mat-list-item
            [ngStyle]="{ backgroundColor: introAnimation ? '#F4BB56' : ''  }"
            routerLink="/main/resources/forms"
            routerLinkActive="activeClass"
          >
            <span class="list-wrapper-items-icon">
              <img class="icons-width" src="assets/shared/Form.svg" />
            </span>
            <span class="list-wrapper-items-name">
              Forms
            </span>
          </a>
        </div>

        <div class="list-wrapper-items">
          <a mat-list-item routerLink="/main/scores" routerLinkActive="activeClass">
            <span class="list-wrapper-items-icon">
              <img class="icons-width" src="assets/shared/Score.svg" />
            </span>
            <span class="list-wrapper-items-name">
              Scores
            </span>
          </a>
        </div>

        <div class="list-wrapper-items" id="resources">
          <a mat-list-item routerLink="/main/extra-resources" routerLinkActive="activeClass">
            <span class="list-wrapper-items-icon">
              <img class="icons-width" src="assets/shared/Resource.svg" />
            </span>
            <span class="list-wrapper-items-name">
              Resources
            </span>
          </a>
        </div>

        <div class="list-wrapper-items">
          <a mat-list-item routerLink="/main/need-to-talk" routerLinkActive="activeClass">
            <span class="list-wrapper-items-icon">
              <img
                class="icons-width"
                src="assets/shared/Need%20to%20talk.svg"
              />
<!--              <img-->
<!--                *ngIf="!isExpanded"-->
<!--                width="25px"-->
<!--                src="assets/modules/icon-need-to-talk.png"-->
<!--              />-->
            </span>
            <span class="list-wrapper-items-name"> Need to talk? </span>
          </a>
        </div>

        <div class = "list-wrapper-items">
          <a mat-list-item routerLink = "/main/settings" routerLinkActive="activeClass">
            <span class = "list-wrapper-items-icon">
              <img class="icons-width" src="assets/shared/setting.svg" />
            </span>
            <span class = "list-wrapper-items-name">Settings</span>
          </a>
        </div>

        <div class = "list-wrapper-items" (click)="reportProblem()">
          <a mat-list-item routerLinkActive="activeClass">
            <span class = "list-wrapper-items-icon">
              <img class="icons-width" src="assets/shared/Report problem.svg" />
            </span>
            <span class = "list-wrapper-items-name">Report bug</span>
          </a>
        </div>

      </div>
    </mat-nav-list>
    <div
      *ngIf="showOverlay"
      class="col-12 px-0 intro-overlay"
      [ngClass]="{
        'd-block': showOverlay,
        'd-none': !showOverlay
      }"
    ></div>
  </mat-drawer>

  <mat-drawer-content class="dashboard-mat-drawer-content" appScrolling>
    <mat-toolbar
      *ngIf="isHandset$ | async"
      #tooltip="matTooltip"
      matTooltipDisabled
      matTooltip="{{ tooltipData }}"
      [matTooltipPosition]="'below'"
      (click)="tooltipShow()"
    >
      <span></span>
    </mat-toolbar>
    <div class="app-main">
      <app-navbar
        [user]="user"
        [appDisableClick]="{ apply: isDisabled }"
        #tooltip="matTooltip"
        matTooltipDisabled
        matTooltip="{{ tooltipData }}"
        [matTooltipPosition]="'below'"
        (click)="tooltipShow()"
        (hamburgerClick)="drawer.toggle()"
        [isHandset$]="isHandset$"
      ></app-navbar>
      <div class="page-div">
        <router-outlet></router-outlet>
      </div>
      <app-chatbot
        *ngIf="user.is_exp && showChatbot"
        [ngStyle]="{ opacity: flowLoaded ? '1' : '0' }"
        [flowOpen]="flowOpen"
      ></app-chatbot>
      <div class="notification-div">
        <ng-template toastNotification></ng-template>
      </div>
    </div>
    <div>
      <ng-template #connection></ng-template>
    </div>
    <div>
      <ng-template #pointsNotification></ng-template>
    </div>
  </mat-drawer-content>
</mat-drawer-container>
