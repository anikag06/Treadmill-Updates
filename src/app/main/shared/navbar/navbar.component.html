<ng-template appNavbarFlow></ng-template>
<div class="app-navbar">
  <div class="row mx-0">
    <div [ngClass]="{
              'col-8': user.is_exp === false,
              'col-7': user.is_exp === true
            }">
      <div class="all-icons">
        <button
          mat-flat-button
          class="back-button"
          *ngIf="!isDashboard"
          (click)="backClick()"
        >
          <img
            src="assets/shared/back web.png"
            width="32px"
            height="32px"
            alt="back"
          />
        </button>
        <div
          [ngClass]="{
            'conv-title': isConversation === true,
            'navbar-title': isConversation === false
          }"
          [matTooltip]="navbarTitle"
          matTooltipPosition="above"
        >
          {{ navbarTitle }}
          <!--          <span class="navbar-title" *ngIf="isDashboard || isConversation"></span>-->
        </div>
      </div>

      <div class="all-icons-mobile">
        <div class=" d-flex flex-row mx-0">
          <div
            class="icon-items" *ngIf="!isDashboard">
          <button
            mat-flat-button
            class="back-button"
            (click)="backClick()"
          >
            <img
              src="assets/shared/Back%20mobile.png"
              width="24px"
              height="24px"
              alt="back"
            />
          </button>
          </div>
          <div
            class="icon-items" *ngIf="isDashboard && isHandset$">
          <button
            id="hamburger"
            class="hamburger-button icon-items"
            type="button"
            aria-label="Toggle sidenav"
            mat-flat-button
            (click)="hamburgerClicked()"
          >
            <img
              width="24px"
              height="24px"
              src="assets/shared/Hamburger mobile.png"
            />
          </button>
          </div>
          <div
          class="icon-items">
          <div
            [ngClass]="{
              'conv-title': isConversation === true,
              'navbar-title': isConversation === false
            }"
            [style.width]="convMode ? '75%' : '100%'"
            [matTooltip]="navbarTitle"
            matTooltipPosition="above"
          >
            {{ navbarTitle
            }}<span
            class="navbar-title"
            *ngIf="isDashboard || isConversation"
          ></span>
          </div>
        </div>
        </div>
      </div>
    </div>

      <div [ngClass]="{
              'col-4': user.is_exp === false,
              'col-5': user.is_exp === true
            }">
      <div
        class="all-icons"
        style="float: right;"
        [ngClass]="{
          'd-none': hideCards
        }"
      >
        <div class="icon-items" *ngIf="!isDashboard" (click)="homeClick()">
          <img src="assets/shared/home web.png" height=" 32px" alt="Home" />
        </div>
        <div *ngIf="user.is_exp">
          <div
            class="icon-items"
            style="margin-left: 20px;"
            (menuClosed)="notificationClick()"
            (menuOpened)="notificationClick()"
            [matMenuTriggerFor]="appNavBarNotify"
          >
            <img
              src="assets/shared/notification web.png"
              height=" 32px"
              width="32px"
              alt="Flow"
            />
          </div>
          <div class="unread-count" *ngIf="unreadCount > 0">
            <span *ngIf="unreadCount < 100; else manyMore">{{
              unreadCount
              }}</span>
          </div>
        </div>

        <div
          id="goto_desktop"
          class="icon-items"
          (click)="flowClick()"
          style="margin-left: 20px;"
        >
          <img src="assets/shared/go to web.png" height=" 36px" alt="GoTo" />
        </div>
      </div>

      <div class="all-icons-mobile">
        <div class="d-flex flex-row-reverse">
          <div class="" >
            <button
              mat-icon-button
              id="showFullConversation"
              [matMenuTriggerFor]="showFullConversation"
              *ngIf="convMode"
            >
              <mat-icon>more_vert</mat-icon>
            </button>
          </div>

          <div
            id="goto_mobile"
            [ngClass]="{
              'd-none': hideCards
            }"
            class="icon-items"
            (click)="flowClick()"
          >
            <img
              src="assets/shared/Go to mobile.png"
              height=" 32px"
              alt="GoTO"
            />
          </div>
          <div *ngIf="user.is_exp">
            <div
              class="icon-items"
              (menuClosed)="notificationClick()"
              (menuOpened)="notificationClick()"
              [matMenuTriggerFor]="appNavBarNotify"
            >
              <img
                src="assets/shared/Notification mobile.png"
                height=" 24px"
                width="24px"
                alt="Flow"
              />
            </div>
            <div
              [ngClass]="{
                'd-none': hideCards
              }"
              class="unread-count"
              *ngIf="unreadCount > 0"
            >
              <span *ngIf="unreadCount < 100; else manyMore">{{
                unreadCount
                }}</span>
            </div>
          </div>
          <div class="icon-items" *ngIf="!isDashboard" (click)="homeClick()">
            <img
              src="assets/shared/Home mobile.png"
              height=" 24px"
              alt="Home"
            />
          </div>
        </div>
      </div>
    </div>

  <mat-menu #showFullConversation="matMenu" xPosition="before">
    <button mat-menu-item (click)="onshowFullConversation()" class="">
      <span>Show full conversation</span>
    </button>
  </mat-menu>

  <!--  <mat-menu #appNavBarFlow="matMenu" xPosition="before" yPosition="below" class="navBarPanelClass">-->
  <!--    <div class="row w-100 h-100 px-0 mx-0 " (click)="$event.stopPropagation()">-->
  <!--      <div appNavbarFlow></div>-->
  <!--    </div>-->
  <!--  </mat-menu>-->

  <mat-menu
    #appNavBarNotify="matMenu"
    class="navBarPanelClass"
    xPosition="before"
    yPosition="below"
  >
    <div class="row w-100 h-100 px-0 mx-0" (click)="$event.stopPropagation()">
      <div appNavbarNotification></div>
    </div>
  </mat-menu>
  <!-- <div appNavbarFlow></div> -->
  <!-- <div appNavbarNotifications></div> -->
</div>
<ng-template #manyMore>
  <span>99+</span>
</ng-template>
