<div class="app-navbar">
  <div class="row">
    <div class="col-6 d-flex navbar-title align-items-center">
      <h1 [ngClass]="{'conv-title': isConversation===true, 
      'navbar-title': isConversation===false }">{{navbarTitle}}<span class="navbar-title"
          *ngIf="isDashboard || isConversation">{{user.username}}</span></h1>
    </div>
    <div class="col-6">
      <div class="all-icons">
        <!-- <div class='icon-items' (click)="notificationClick()">
                    <img src="assets/shared/notification.svg" alt="Flow">
                </div> -->
        <div *ngIf="user.is_exp">
          <div class="icon-items" (menuClosed)="notificationClick()" (menuOpened)="notificationClick()"
            [matMenuTriggerFor]="appNavBarNotify">
            <img src="assets/shared/Notification.png" height=" 36px" width="36px" alt="Flow">
          </div>
          <div class="unread-count" *ngIf="unreadCount > 0">
            <span *ngIf="unreadCount < 100; else manyMore">{{
              unreadCount
            }}</span>
          </div>
        </div>

        <!-- <div class='icon-items' (click)="flowClick()">
                    <img src="assets/shared/flow.svg" alt="Flow">
                </div> -->
        <div class="icon-items" (menuClosed)="flowClick($event)" (menuOpened)="flowClick($event)"
          [matMenuTriggerFor]="appNavBarFlow">
          <img src="assets/shared/Flow.png" height=" 36px" width="36px" alt="Flow">
        </div>
      </div>
      <div class="all-icons-mobile">
        <div class="d-flex flex-row-reverse">
          <button mat-icon-button id="showFullConversation" [matMenuTriggerFor]="showFullConversation" *ngIf="convMode">
            <mat-icon>more_vert</mat-icon>
          </button>
          <div *ngIf="user.is_exp">
            <div class="icon-items" (menuClosed)="notificationClick()" (menuOpened)="notificationClick()"
              [matMenuTriggerFor]="appNavBarNotify">
              <img src="assets/shared/Notification mobile.png" height=" 24px" width="24px" alt="Flow" />
            </div>
            <div class="unread-count" *ngIf="unreadCount > 0">
              <span *ngIf="unreadCount < 100; else manyMore">{{
              unreadCount
            }}</span>
            </div>
          </div>
          <div class="icon-items" (menuClosed)="flowClick($event)" (menuOpened)="flowClick($event)"
            [matMenuTriggerFor]="appNavBarFlow">
            <img src="assets/shared/Flow mobile.png" height=" 24px" width="24px" alt="Flow" />
          </div>
        </div>
      </div>
    </div>
  </div>

  <mat-menu #showFullConversation="matMenu" xPosition="before">
    <button mat-menu-item (click)="onshowFullConversation()" class="">
      <span>Show full conversation</span>
    </button>
  </mat-menu>

  <mat-menu #appNavBarFlow="matMenu" xPosition="before" yPosition="below" class="navBarPanelClass">
    <div class="row w-100 h-100 px-0 mx-0 " (click)="$event.stopPropagation()">
      <div appNavbarFlow></div>
    </div>
  </mat-menu>

  <mat-menu #appNavBarNotify="matMenu" class="navBarPanelClass" xPosition="before" yPosition="below">
    <div class="row w-100 h-100 px-0 mx-0" (click)="$event.stopPropagation()">
      <div appNavbarNotification></div>
    </div>
  </mat-menu>
  <!-- <div appNavbarFlow></div> -->
  <!-- <div appNavbarNotifications></div> -->
</div>
<ng-template #manyMore>
  <span>99+</span>
</ng-template>
