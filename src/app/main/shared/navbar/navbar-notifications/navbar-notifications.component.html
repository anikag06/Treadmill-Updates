<div class="navbar-notification">
    <h2>Notification <small>({{unreadCount}})</small></h2>
    <div class="all-notifications" #notificationsDiv [scrollTop]="scrollTop">
        <app-notification-item
            *ngFor="let notification of notifications"
            [item]="notification"
            (decrementUnread)="markUnread()">
        </app-notification-item>
    </div>
    <div class="more-btn" (click)=" onMoreClick()" *ngIf="!noMoreItems else noItems">
        Show More
    </div>
</div>
<ng-template #noItems>
    <div class="no-more-btn">
        No more notifications
    </div>
</ng-template>
