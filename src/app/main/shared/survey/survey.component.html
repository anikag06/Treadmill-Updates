<div class="survey-component">
  <div class="container px-0" [@simpleFadeAnimation]="'in'" *ngIf="!display_survey">
    <div class="row main mx-auto text-center">
      <div class="col-md-6 mx-auto ">
        <div class=" survey-start">
          Please fill out this survey to let us know what you think about TreadWill. It will take 3-4 minutes.
        </div>
        <div #startBtn>
        <button type="button" class="disabled-button" mat-stroked-button (click)="loadQuestions($event)"  *ngIf="!showLoading"> Start
          survey</button>
          <button class="active-button" *ngIf="showLoading" type="button" mat-raised-button >
            <span class="spinner-border spinner-border-sm"></span>
            &nbsp; Loading..
          </button>
        </div>
      </div>
    </div>
  </div>
  <div>
    <div class="container justify-content-center px-0" *ngIf="display_survey" [@simpleFadeAnimation]="'in'">
      <div class="row main mx-auto">
        <div class="col-md-12">
          <div class="row">
            <div class="col-1 col-md-2 my-auto px-0">
              <button type="button" class="btn btn-default btn-left" aria-label="Left Align" (click)="onback()"
                *ngIf="back">
                <mat-icon>arrow_back_ios</mat-icon>
              </button>
            </div>
            <div class="col-10 col-md-8 my-auto" *ngIf="!submit" [@in]="quesCount">
              <div>
                <div class="pager mt-4 mb-2 text-muted row justify-content-center">Question
                  {{pager.index }}
                  of
                  {{pager.count}}</div>
                <br>
                <div class="col mb-4 text-center">

                  <div><b>{{ques}}</b></div>

                </div>
                <br>
                <div class="row justify-content-center" *ngFor="let option of options">
                  <div class=".col-md-6 .offset-md-3" class="button-group">
                    <button id="option1" type="button" (click)="visible === false || onselect($event, option.value, option.name)"
                      mat-stroked-button
                      [ngClass]="{'active-button':option.value===selectedOptionValue,
                      'disabled-button':option.value!==selectedOptionValue,
                      'disabled': !visible, 'hover': !visible}"
                           >

                      <span>{{option.name}}</span>
                    </button>
                  </div>
                </div>
              </div>

            </div>
            <div class="col-10 col-md-8 text-center my-auto" *ngIf="submit" [@simpleFadeAnimation]="'in'">
              <div class="row justify-content-center" style="margin-top:60px;">
                Thank you for your feedback.
                <br>
                And here's our feedback for you: You're awesome 🤗.
              </div>
              <div class="row justify-content-center" #submitBtn *ngIf="!showNextStep">
                <button type="button" class="disabled-button" style="margin-top:60px;min-width: 140px !important;"
                  mat-stroked-button *ngIf="submit && !submitting" (click)="onSubmit($event)" >Submit
                </button>
                <button class="active-button" *ngIf="submitting" style="margin-top:60px;min-width: 140px !important;"
                        type="button"mat-stroked-button >
                  <span class="spinner-border spinner-border-sm"></span>
                  &nbsp; Loading..
                </button>
              </div>
              <div class="row justify-content-center" *ngIf="showNextStep" style="margin-top:60px;">
              <app-step-completed [showNextStep]="showNextStep" [showloading]="false" [fromSurvey]="true"  (nextStepEvent)="onNextStep()" ></app-step-completed>
              </div>
            </div>
            <div class="col-1 col-md-2 my-auto px-0">
              <button type="button" class="btn btn-default btn-right" aria-label="Right Align" (click)="onfront()"
                *ngIf="front">

                <mat-icon>arrow_forward_ios</mat-icon>
              </button>
            </div>

          </div>
        </div>
      </div>

    </div>
  </div>
</div>
