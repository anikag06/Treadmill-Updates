<div>
<mat-card class="profile-card" id="profile">
  <div class="profile-header">
    <mat-card-header>
      <div mat-card-avatar>
        <img [src]="userProfile.user_avatar" class="profile-image" alt="You"  (load)="removeLoading()" [ngStyle]="{display: showLoading ? 'none' : 'block'}" />
        <div class="profile-image img-skeleton " alt="You" [ngStyle]="{display: !showLoading ? 'none' : 'block'}" ></div>
      </div>
      <mat-card-title  class="pl-4">{{ userProfile.username }}</mat-card-title>
      <mat-card-subtitle>
        <div id="points" class="row points mx-0" #points>
          <div class="col-4 scores">
            <div class="box-blue"></div>
            <div class="value">{{ userProfile.score }}</div>
          </div>
          <div class="col medal">
            <div class="circle gold"></div>
            <div class="value">{{ userProfile.no_of_gold_badges }}</div>
          </div>
          <div class="col medal">
            <div class="circle silver"></div>
            <div class="value">{{ userProfile.no_of_silver_badges }}</div>
          </div>
          <div class="col medal">
            <div class="circle bronze"></div>
            <div class="value">{{ userProfile.no_of_bronze_badges }}</div>
          </div>
        </div>
      </mat-card-subtitle>
    </mat-card-header>
  </div>
  <mat-card-content>
    <mat-tab-group>
      <mat-tab label="Gold">
        <ng-template mat-tab-label>
          <div class="col tab-label">
            <div class="label-circle gold"></div>
            Gold
          </div>
        </ng-template>
        <ng-template matTabContent>
          <app-badges [badgeList]="getGoldBadgeList()" [profileLoaded] = "profileLoaded"> </app-badges>
        </ng-template>
      </mat-tab>
      <mat-tab>
        <ng-template mat-tab-label>
          <div class="col tab-label">
            <div class="label-circle silver"></div>
            Silver
          </div>
        </ng-template>
        <ng-template matTabContent>
          <app-badges [badgeList]="getSilverBadgeList()" [profileLoaded] = "profileLoaded"> </app-badges>
        </ng-template>
      </mat-tab>
      <mat-tab label="Bronze">
        <ng-template mat-tab-label>
          <div class="col tab-label">
            <div class="label-circle bronze"></div>
            Bronze
          </div>
        </ng-template>
        <ng-template matTabContent>
          <app-badges [badgeList]="getBronzeBadgeList()" [profileLoaded] = "profileLoaded"> </app-badges>
        </ng-template>
      </mat-tab>
    </mat-tab-group>
  </mat-card-content>
  <mat-card-actions> </mat-card-actions>
</mat-card>
</div>
