<div 
  class="category-card"
  [ngClass]="{'last': last,
              'first': first,
              'active': category.is_active ===  true,
              'locked': category.is_content_locked == true,
              'in-current-module': currentModule}">
  <img
    class="card-image"
    [src]="imageUrl()" 
    width="70"
    height="70">
</div>
