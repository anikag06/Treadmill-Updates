<div class="row signup-page w-100 no-gutters">
  <div class = "col-sm-12 col-md-5">
    <app-signup-reset-common></app-signup-reset-common>
  </div>
  <div class="d-flex flex-column col-sm-12 col-md-7 text-center  no-gutters" *ngIf = "!passwordChangedPageShow && !errorPage">
    <div class="flex-column mx-auto my-auto align-self-center">
      <h4>Reset Password</h4>
      <div *ngIf = "dashboardLinkShow">
        <p>You are already logged in. Go to the <a routerLink = "/main/dashboard">dashboard</a>.</p>
      </div>
      <div *ngIf="!showResetPasswordForm && !dashboardLinkShow" class="d-flex flex-row align-items-center justify-content-start"
           style="height: 450px; width: 100%;">
        <img src="../../../assets/shared/dna-loader.svg" alt="loader">
      </div>


        <div *ngIf = "showResetPasswordForm">

        <form #resetForm="ngForm" class="signup-form">
          <mat-hint class = "error-msg" *ngIf = "errorMsgShow" >{{this.errorMessage}}</mat-hint>
          <mat-hint class = "error-msg" *ngIf = "passwordMatchErrorMsgShow">Enter same passwords</mat-hint>

            <div class="row no-gutters justify-content-start">
              <mat-form-field style="width:100%">
                <input
                  matInput
                  placeholder="New Password"
                  type="password"
                  [(ngModel)] = "newPassword"
                  required
                  name="new_password"
                  class="example-right-align"
                  (input) = "newPasswordInput()">

              </mat-form-field>
            </div>

            <div class="row no-gutters justify-content-start">
              <mat-form-field style="width:100%">
                <input
                  matInput
                  placeholder="Confirm Password"
                  type = "password"
                  [(ngModel)] = "confirmPassword"
                  required
                  name="confirm_password"
                  (input) = confirmPasswordInput()>

              </mat-form-field>
            </div>
            <div mat-dialog-actions class="d-flex justify-content-end">
              <button
                *ngIf = "!loading"
                mat-raised-button
                class="signup-btn"
                type="submit"
                [disabled] = "!this.newPasswordTyped || !this.confirmPasswordTyped  "
                (click) = "resetSubmitClicked()">
                Submit
              </button>

              <button
                color="primary"
                class = "loading-btn"
                *ngIf="loading"
                type="button" mat-raised-button >
                <span class="spinner-border spinner-border-sm"></span>
                &nbsp; Loading..
              </button>
            </div>
        </form>
     </div>
    </div>
  </div>

     <div class="d-flex flex-column col-sm-12 col-md-7 text-center  no-gutters" *ngIf = "passwordChangedPageShow">
       <div class="flex-column mx-auto my-auto align-self-center">
          <h4>Reset Password</h4>
         <div class="justify-content-center" *ngIf = "passwordChangedPageShow">
           <p>Your password has been changed successfully.</p>
           <a routerLink="/landing/login"> Click here to login</a>
         </div>
        </div>



     </div>


  <div class="d-flex flex-column col-sm-12 col-md-7 text-center  no-gutters" *ngIf= "errorPage">
    <div class="flex-column mx-auto my-auto align-self-center">
      <h4>Reset Password</h4>
      <div *ngIf="!showResetPasswordForm" class="d-flex flex-row align-items-center justify-content-start"
           style="height: 450px; width: 100%;">
        <img src="../../../assets/shared/dna-loader.svg" alt="loader">
      </div>
      <div *ngIf = "showResetPasswordForm">
      <p>{{this.linkExpiredMsg}} Request another link<a routerLink="/landing/reset-password"> here</a>.</p>
    </div>
    </div>
  </div>
<div class="row w-100 no-gutters  footer-small-device">
  <p>
    All Rights Reserved &copy; TreadWill
  </p>

</div>
