<form
  (submit)="onSubmit()"
  #loginForm="ngForm"
  *ngIf="showForm else loader">
  <div
    class="flex-row-reverse"
    mat-dialog-actions>
    <mat-icon
      (click)="onCloseClick()"
      class="cursor-hand">
        close
    </mat-icon>
  </div>
  <div class="input-container text-center">
    <mat-form-field>
      <input
        matInput
        placeholder="Username"
        type="text"
        ngModel
        required
        name="username"
        class="example-right-align">
      <mat-error>Username is required</mat-error>
    </mat-form-field>
    <mat-form-field>
      <input
        matInput
        placeholder="Enter your password"
        [type]="hide ? 'password' : 'text'"
        ngModel
        required
        name="password">
      <mat-icon matSuffix (click)="hide = !hide">{{hide ? 'visibility_off' : 'visibility'}}</mat-icon>
      <mat-error>Password is required</mat-error>
    </mat-form-field>
    <div class="error" *ngIf="formInvalid">
      Username or Password is incorrect!
    </div>
    <div
      mat-dialog-actions
      class="forgot-password">
      <a class="anchorify-forgot-username-password">
        Forgot Username/Password?
      </a>
    </div>
    <div
      mat-dialog-actions
      class="d-flex justify-content-center">
      <button
        mat-raised-button
        class="dialog-btn"
        type="submit">
          Login
      </button>
    </div>
    <div
      mat-dialog-actions
      class="d-flex justify-content-center join-study">
      <p class="login-dialog-text-color">
        Not a member yet?
        <a class="anchorify-join-the-study">
          Join the study
        </a>
      </p>
    </div>
  </div>
</form>
<ng-template #loader>
  <div class="d-flex align-items-center justify-content-center" style="height: 450px; width: 100%;">
    <img src="assets/shared/dna-loader.svg" alt="loader">
  </div>
</ng-template>
