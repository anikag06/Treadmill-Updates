<div [@myRouteAnimation]="getRouteData(o)">
  <router-outlet #o="outlet"></router-outlet>
</div>

<div
  *ngIf="isUpdating"
  style="
    width: 100%;
    height: 100vh;
    background-color: #2a3b3d;
    text-align: center;
    padding-top: 150px;
    z-index: 99999;
  "
>
  <img src="assets/shared/loading-gif.gif" alt="loading..." width="80" />
  <div [ngStyle]="{ fontSize: '16px', color: '#F5BB56' }">
    Updating latest changes
  </div>
</div>
